<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陽光花園 jackpipi — 讓植物成為生活的錨點</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    /* 核心變數與基礎樣式 */
    :root {
      --forest:#3D5040; --deep-forest:#253228; --moss:#6B7C5C; --sage:#A8B5A2;
      --sand:#E8DDD0; --sand-light:#F5F0EA; --cream:#FAF7F2; --bg:#F5F2EE;
      --white:#FFFFFF; --text:#2E2E2E; --text-muted:#7A7A7A; --terracotta:#B5704F;
      --border:rgba(107,124,92,0.15); --font-serif:'Noto Serif TC',serif;
      --font-display:'Cormorant Garamond',serif; --nav-height:72px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-serif);background:var(--bg);color:var(--text);overflow-x:hidden}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    
    /* NAV */
    .nav{position:fixed;top:0;width:100%;z-index:100;height:var(--nav-height);background:rgba(245,242,238,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center}
    .nav__inner{display:flex;justify-content:space-between;width:100%;align-items:center}
    .nav__logo{font-weight:700;color:var(--forest);text-decoration:none;font-size:1.2rem}
    .nav__links{display:flex;gap:32px;list-style:none}
    .nav__link{text-decoration:none;color:var(--text-muted);font-size:0.88rem;transition:0.3s}
    .nav__link:hover{color:var(--forest)}

    /* HERO */
    .hero{position:relative;min-height:100vh;display:flex;align-items:center;padding-top:var(--nav-height)}
    .hero__bg{position:absolute;inset:0;z-index:1;background:url('https://images.unsplash.com/photo-1459411552884-841db9b3cc2a?auto=format&fit=crop&w=1920&q=80') center/cover}
    .hero__bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(245,242,238,.95),rgba(245,242,238,0.2))}
    .hero__content{position:relative;z-index:2;max-width:600px}
    .hero__title{font-family:var(--font-display);font-size:clamp(3rem,8vw,5rem);font-weight:300;line-height:1.1;color:var(--deep-forest)}
    .hero__title em{font-style:italic;color:var(--terracotta)}

    /* FEATURED SECTION */
    .section{padding:100px 0}
    .featured-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:30px;margin-top:50px}
    .product-card{background:var(--white);border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.05);transition:0.4s;position:relative;display:flex;flex-direction:column}
    .product-card:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(0,0,0,0.1)}
    .card-img{aspect-ratio:1/1;background:var(--sand-light);display:flex;align-items:center;justify-content:center;overflow:hidden}
    .card-img img{width:100%;height:100%;object-fit:cover}
    .card-body{padding:24px;flex:1;display:flex;flex-direction:column}
    .card-name{font-size:1.1rem;margin-bottom:8px;color:var(--deep-forest)}
    .card-price{font-family:var(--font-serif);color:var(--moss);font-weight:600}
    .badge{position:absolute;top:15px;left:15px;padding:4px 12px;background:var(--terracotta);color:#fff;border-radius:20px;font-size:0.7rem;z-index:2}

    /* FOOTER */
    footer{background:var(--deep-forest);color:rgba(250,247,242,0.6);padding:60px 0;text-align:center;font-size:0.8rem}
  </style>
</head>
<body>

<nav class="nav">
  <div class="container nav__inner">
    <a href="index.html" class="nav__logo">陽光花園 jackpipi</a>
    <ul class="nav__links">
      <li><a href="product.html" class="nav__link">所有植物</a></li>
      <li><a href="pet.html" class="nav__link">照護助手</a></li>
      <li><a href="about.html" class="nav__link">品牌故事</a></li>
    </ul>
  </div>
</nav>

<header class="hero">
  <div class="hero__bg"></div>
  <div class="container">
    <div class="hero__content">
      <h1 class="hero__title">讓植物成為<br>生活的<em>錨點</em></h1>
      <p style="margin:24px 0 40px; color:var(--text-muted)">我們相信，每一株植物都是一段慢生活的開始。</p>
      <a href="product.html" style="padding:15px 35px; background:var(--forest); color:var(--cream); border-radius:30px; text-decoration:none; display:inline-block">進入植物室</a>
    </div>
  </div>
</header>

<section class="section">
  <div class="container">
    <div style="text-align:center">
      <h2 style="font-family:var(--font-display); font-size:2.5rem; font-weight:300">精選<em>綠色陪伴</em></h2>
      <p style="color:var(--text-muted); margin-top:10px">來自後台即時更新的熱門選品</p>
    </div>
    <div class="featured-grid" id="featured-list">
      </div>
  </div>
</section>

<footer>
  <div class="container">
    <p>© 2026 陽光花園 jackpipi. All rights reserved.</p>
  </div>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, where, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC103Q-v31-z7nHnnM8KpIZbrrzjrGgGJ4",
    authDomain: "fir-config-f2e57.firebaseapp.com",
    projectId: "fir-config-f2e57",
    storageBucket: "fir-config-f2e57.firebasestorage.app",
    messagingSenderId: "860181486529",
    appId: "1:860181486529:web:6f7053a9141694afc66d40"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 實時監聽精選商品
  function listenFeatured() {
    const listEl = document.getElementById('featured-list');
    if (!listEl) return;

    // 建立查詢：必須同時滿足 上架中(active) 且 是精選(featured)
    const q = query(
      collection(db, "products"),
      where("active", "==", true),
      where("featured", "==", true),
      limit(4)
    );

    onSnapshot(q, (snapshot) => {
      if (snapshot.empty) {
        listEl.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-light);">目前尚無精選植物，請到後台勾選「🔥 熱銷精選」。</p>';
        return;
      }

      let html = '';
      snapshot.forEach(doc => {
        const p = doc.data();
        const media = p.imageUrl 
          ? `<img src="${p.imageUrl}" alt="${p.name}">` 
          : `<span style="font-size:3.5rem">${p.emoji || '🌿'}</span>`;

        html += `
          <article class="product-card">
            <span class="badge">精選</span>
            <div class="card-img">${media}</div>
            <div class="card-body">
              <h3 class="card-name">${p.name}</h3>
              <p class="card-price">NT$ ${p.price.toLocaleString()}</p>
              <a href="product.html" style="margin-top:15px; font-size:0.8rem; color:var(--moss); text-decoration:underline; display:block">查看詳細照護資訊</a>
            </div>
          </article>
        `;
      });
      listEl.innerHTML = html;
    }, (error) => {
      console.error("Firebase 讀取失敗:", error);
      listEl.innerHTML = '<p>讀取植物室時遇到一點小阻礙...</p>';
    });
  }

  listenFeatured();
</script>
</body>
</html>
