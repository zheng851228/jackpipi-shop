<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陽光花園 jackpipi — 讓植物成為生活的錨點</title>
  
  <link rel="stylesheet" href="global.css" />
  
  <style>
    /* 首頁專屬樣式 (Hero & 網格排版) */
    .hero { position:relative; min-height:100vh; display:flex; align-items:center; padding-top:var(--nav-h); }
    .hero__bg { position:absolute; inset:0; z-index:1; background:url('https://images.unsplash.com/photo-1459411552884-841db9b3cc2a?auto=format&fit=crop&w=1920&q=80') center/cover; }
    .hero__bg::after { content:''; position:absolute; inset:0; background:linear-gradient(to right,rgba(245,242,238,.95),rgba(245,242,238,0.2)); }
    .hero__content { position:relative; z-index:2; max-width:600px; }
    .hero__title { font-family:var(--font-display); font-size:clamp(3rem,8vw,5rem); font-weight:300; line-height:1.1; color:var(--deep-forest); }
    .hero__title em { font-style:italic; color:var(--terracotta); }

    .featured-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:30px; margin-top:50px; }
    .product-card { background:var(--white); border-radius:var(--r-lg); overflow:hidden; border:1px solid var(--border); box-shadow:var(--shadow-sm); transition:transform var(--t) var(--ease), box-shadow var(--t) var(--ease); position:relative; display:flex; flex-direction:column; }
    .product-card:hover { transform:translateY(-8px); box-shadow:var(--shadow-md); }
    .card-img { aspect-ratio:1/1; background:var(--sand-light); display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .card-img img { width:100%; height:100%; object-fit:cover; }
    .card-body { padding:24px; flex:1; display:flex; flex-direction:column; }
    .card-name { font-size:1.1rem; margin-bottom:8px; color:var(--deep-forest); font-weight:700; }
    .card-price { font-family:var(--font-mono); color:var(--forest); font-weight:500; }
  </style>
</head>

<body data-page="home">

  <header class="hero">
    <div class="hero__bg"></div>
    <div class="container">
      <div class="hero__content reveal reveal-left">
        <h1 class="hero__title">讓植物成為<br>生活的<em>錨點</em></h1>
        <p style="margin:24px 0 40px; color:var(--text-muted)">我們相信，每一株植物都是一段慢生活的開始。</p>
        <a href="product.html" class="btn btn--primary">進入植物室</a>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div style="text-align:center" class="reveal reveal-scale">
        <h2 class="section-title">精選<em>綠色陪伴</em></h2>
        <p style="color:var(--text-muted); margin-top:10px">來自後台即時更新的熱門選品</p>
      </div>
      <div class="featured-grid" id="featured-list">
        <div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-muted);">連線至植物室中...🌿</div>
      </div>
    </div>
  </section>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="global.js"></script>
  
  <script type="module">
    import { db } from "./firebase-config.js";
    import { collection, query, where, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const escapeHTML = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[ch]));

    function safeImageUrl(url) {
      try {
        const parsed = new URL(url, window.location.href);
        return parsed.protocol === "https:" || parsed.protocol === "http:";
      } catch {
        return false;
      }
    }

    function listenFeatured() {
      const listEl = document.getElementById('featured-list');
      if (!listEl) return;

      const q = query(
        collection(db, "products"),
        where("active", "==", true),
        where("featured", "==", true),
        limit(4)
      );

      onSnapshot(q, (snapshot) => {
        if (snapshot.empty) {
          listEl.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-light);">目前尚無精選植物，請到後台勾選「🔥 熱銷精選」。</p>';
          return;
        }

        let html = '';
        snapshot.forEach(doc => {
          const p = doc.data();
          const media = safeImageUrl(p.imageUrl)
            ? `<img src="${escapeHTML(p.imageUrl)}" alt="${escapeHTML(p.name)}">`
            : `<span style="font-size:3.5rem">${escapeHTML(p.emoji || '🌿')}</span>`;

          html += `
            <article class="product-card reveal reveal-scale visible">
              <span class="badge badge--hot" style="position:absolute; top:15px; left:15px; z-index:2;">精選</span>
              <div class="card-img">${media}</div>
              <div class="card-body">
                <h3 class="card-name">${escapeHTML(p.name)}</h3>
                <p class="card-price">NT$ ${Number(p.price || 0).toLocaleString()}</p>
                <a href="product.html" style="margin-top:15px; font-size:0.8rem; color:var(--moss); text-decoration:underline; display:block">查看詳細照護資訊</a>
              </div>
            </article>
          `;
        });
        listEl.innerHTML = html;
      }, (error) => {
        console.error("Firebase 讀取失敗:", error);
        listEl.innerHTML = '<p>讀取植物室時遇到一點小阻礙...</p>';
      });
    }

    // 啟動監聽
    listenFeatured();
  </script>
</body>
</html>
