<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>照護助手 — 陽光花園 jackpipi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --sage:#A8B5A2;--moss:#6B7C5C;--forest:#3D5040;--deep-forest:#253228;
  --sand:#E8DDD0;--sand-light:#F5F0EA;--blush:#D4A8A0;--terracotta:#B5704F;
  --cream:#FAF7F2;--bg:#F5F2EE;--white:#FFFFFF;--text:#2E2E2E;--text-muted:#7A7A7A;--text-light:#ABABAB;
  --border:rgba(107,124,92,0.15);
  --shadow-sm:0 2px 12px rgba(61,80,64,0.07);
  --shadow-md:0 8px 32px rgba(61,80,64,0.11);
  --shadow-lg:0 24px 64px rgba(61,80,64,0.14);
  --radius-md:12px;--radius-lg:20px;--radius-full:999px;
  --font-serif:'Noto Serif TC',serif;
  --font-display:'Cormorant Garamond',serif;
  --font-mono:'DM Mono',monospace;
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);
  --nav-height:72px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-serif);background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
ul{list-style:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.container{max-width:1100px;margin:0 auto;padding:0 24px}

/* NAV */
.nav{position:fixed;top:0;width:100%;z-index:100;height:var(--nav-height);background:rgba(245,242,238,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;transition:all .3s}
.nav__inner{display:flex;align-items:center;justify-content:space-between;width:100%}
.nav__logo{font-family:var(--font-serif);font-size:1.2rem;font-weight:700;color:var(--forest);letter-spacing:0.04em}
.nav__links{display:flex;gap:36px}
.nav__link{font-size:0.86rem;color:var(--text-muted);letter-spacing:0.05em;transition:color var(--transition);position:relative}
.nav__link::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--moss);transform:scaleX(0);transform-origin:left;transition:transform var(--transition)}
.nav__link:hover,.nav__link.active{color:var(--forest)}
.nav__link:hover::after,.nav__link.active::after{transform:scaleX(1)}

/* PAGE HEADER */
.page-header{padding:calc(var(--nav-height) + 70px) 0 70px;background:linear-gradient(135deg,#e8ede6 0%,var(--sand-light) 50%,var(--bg) 100%);text-align:center;position:relative;overflow:hidden}
.page-header::before{content:'🌿';position:absolute;font-size:18rem;opacity:0.04;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;line-height:1}
.page-header__eyebrow{font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.16em;color:var(--moss);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:10px}
.page-header__eyebrow::before,.page-header__eyebrow::after{content:'';width:22px;height:1px;background:var(--moss)}
.page-header__title{font-family:var(--font-display);font-size:clamp(2.4rem,6vw,4rem);font-weight:300;color:var(--deep-forest);line-height:1.1;margin-bottom:16px}
.page-header__title em{font-style:italic;color:var(--terracotta)}
.page-header__desc{font-size:0.95rem;color:var(--text-muted);max-width:540px;margin:0 auto;line-height:1.85}

/* SEARCH BOX */
.search-section{padding:60px 0 0}
.search-box{background:var(--white);border-radius:var(--radius-lg);padding:40px;box-shadow:var(--shadow-md);border:1px solid var(--border);max-width:680px;margin:0 auto}
.search-label{display:block;font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.14em;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px}
.search-row{display:flex;gap:12px}
.search-input{flex:1;padding:14px 18px;border:1.5px solid var(--border);border-radius:var(--radius-full);font-family:var(--font-serif);font-size:0.95rem;color:var(--text);background:var(--bg);outline:none;transition:border-color var(--transition),box-shadow var(--transition)}
.search-input:focus{border-color:var(--moss);box-shadow:0 0 0 3px rgba(107,124,92,0.10)}
.search-btn{padding:14px 28px;background:var(--forest);color:var(--cream);border-radius:var(--radius-full);font-size:0.88rem;font-family:var(--font-serif);letter-spacing:0.05em;transition:all var(--transition);border:none;cursor:pointer;white-space:nowrap}
.search-btn:hover{background:var(--deep-forest);transform:translateY(-1px)}
.search-hint{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.search-hint-label{font-size:0.72rem;font-family:var(--font-mono);color:var(--text-light);letter-spacing:0.06em}
.search-tag{padding:4px 12px;border-radius:var(--radius-full);background:var(--sand-light);border:1px solid var(--border);font-size:0.78rem;color:var(--text-muted);cursor:pointer;transition:all var(--transition)}
.search-tag:hover{background:var(--sage);color:var(--white);border-color:var(--sage)}

/* RESULT */
.result-section{padding:40px 0 80px;max-width:680px;margin:0 auto}
.result-card{background:var(--white);border-radius:var(--radius-lg);padding:36px;box-shadow:var(--shadow-md);border:1px solid var(--border);animation:resultIn .35s ease}
@keyframes resultIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-header{display:flex;align-items:center;gap:20px;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.result-emoji{font-size:3.2rem;width:72px;height:72px;display:flex;align-items:center;justify-content:center;background:var(--sand-light);border-radius:var(--radius-lg);flex-shrink:0}
.result-title{font-family:var(--font-serif);font-size:1.4rem;font-weight:500;color:var(--deep-forest);margin-bottom:4px}
.result-species{font-family:var(--font-display);font-style:italic;font-size:0.9rem;color:var(--text-light);margin-bottom:8px}
.result-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:3px 10px;border-radius:var(--radius-full);font-size:0.68rem;font-family:var(--font-mono);letter-spacing:0.06em}
.tag--safe{background:rgba(107,124,92,0.12);color:var(--moss)}
.tag--caution{background:rgba(181,112,79,0.12);color:var(--terracotta)}
.tag--diff{background:rgba(168,181,162,0.2);color:var(--forest)}
.care-grid-result{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
.care-item{background:var(--sand-light);border-radius:var(--radius-md);padding:16px}
.care-item__icon{font-size:1.4rem;margin-bottom:8px}
.care-item__label{font-family:var(--font-mono);font-size:0.68rem;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px}
.care-item__val{font-size:0.88rem;color:var(--text);font-weight:500}
.care-item__sub{font-size:0.78rem;color:var(--text-muted);margin-top:3px;line-height:1.5}
.result-desc{font-size:0.9rem;color:var(--text-muted);line-height:1.85;padding:20px;background:var(--sand-light);border-radius:var(--radius-md);border-left:3px solid var(--moss);margin-bottom:24px}
.result-tips{margin-bottom:24px}
.result-tips__title{font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.12em;color:var(--moss);text-transform:uppercase;margin-bottom:12px}
.tip-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.86rem;color:var(--text-muted)}
.tip-item:last-child{border-bottom:none}
.tip-item span:first-child{flex-shrink:0}
.result-actions{display:flex;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:var(--radius-full);font-size:0.86rem;font-family:var(--font-serif);letter-spacing:0.04em;transition:all var(--transition);cursor:pointer;border:none}
.btn--primary{background:var(--forest);color:var(--cream)}
.btn--primary:hover{background:var(--deep-forest);transform:translateY(-2px)}
.btn--outline{border:1px solid var(--border);color:var(--forest);background:transparent}
.btn--outline:hover{border-color:var(--moss);background:rgba(107,124,92,0.06)}
.not-found{text-align:center;padding:48px 0}
.not-found p{color:var(--text-muted);font-size:0.92rem}
.not-found p:first-child{font-size:2rem;margin-bottom:12px}

/* ALL PLANTS LIST */
.plants-section{padding:0 0 100px}
.plants-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.plants-title{font-family:var(--font-display);font-size:1.8rem;font-weight:300;color:var(--deep-forest)}
.plants-title em{font-style:italic;color:var(--terracotta)}
.pet-toggle{display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--text-muted);cursor:pointer;transition:color var(--transition)}
.pet-toggle input{accent-color:var(--moss);cursor:pointer}
.pet-toggle:hover{color:var(--forest)}
.plants-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.plant-row{display:flex;align-items:center;gap:16px;background:var(--white);border-radius:var(--radius-lg);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow-sm);cursor:pointer;transition:all var(--transition)}
.plant-row:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(107,124,92,0.25)}
.plant-row__emoji{font-size:2rem;width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:var(--sand-light);border-radius:var(--radius-md);flex-shrink:0}
.plant-row__info{flex:1}
.plant-row__name{font-size:0.95rem;font-weight:500;color:var(--deep-forest);margin-bottom:3px}
.plant-row__meta{font-size:0.72rem;color:var(--text-light);font-family:var(--font-mono);letter-spacing:0.06em}
.plant-row__tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.plant-row__safe{font-size:0.65rem;font-family:var(--font-mono);padding:2px 7px;border-radius:var(--radius-full);background:rgba(107,124,92,0.1);color:var(--moss)}
.plant-row__unsafe{font-size:0.65rem;font-family:var(--font-mono);padding:2px 7px;border-radius:var(--radius-full);background:rgba(181,112,79,0.1);color:var(--terracotta)}
.plant-row__diff{font-size:0.65rem;font-family:var(--font-mono);padding:2px 7px;border-radius:var(--radius-full);background:var(--sand);color:var(--text-muted)}
.plant-row__arrow{color:var(--text-light);transition:transform var(--transition);flex-shrink:0}
.plant-row:hover .plant-row__arrow{transform:translateX(4px);color:var(--moss)}

/* SECTION DIVIDER */
.section-div{height:1px;background:var(--border);margin:60px 0 56px}

/* RWD */
@media(max-width:768px){
  .nav__links{display:none}
  .search-row{flex-direction:column}
  .search-btn{width:100%}
  .care-grid-result{grid-template-columns:1fr}
  .plants-grid{grid-template-columns:1fr}
}
@media(max-width:480px){
  .container{padding:0 16px}
  .search-box{padding:24px 18px}
  .result-card{padding:24px 18px}
}
</style>
</head>

<!-- NAV -->
<nav class="nav" id="nav">
  <div class="container nav__inner">
    <a href="index.html" class="nav__logo">陽光花園 jackpipi</a>
    <ul class="nav__links">
      <li><a href="product.html" class="nav__link">所有植物</a></li>

</div>

<!-- SEARCH -->
<div class="search-section">

      </div>

        <span class="search-hint-label">快速查詢：</span>

        <span class="search-tag" data-q="桃之嬌">桃之嬌</span>
      </div>
    </div>

    <!-- RESULT -->
    <div class="result-section" id="result-section" style="display:none"></div>
  </div>
</div>

<div class="container"><div class="section-div"></div></div>

<!-- ALL PLANTS -->
<div class="plants-section">
  <div class="container">
    <div class="plants-header">
      <h2 class="plants-title">所有<em>照護資訊</em></h2>
      <label class="pet-toggle">
        <input type="checkbox" id="pet-only"/> 只顯示寵物友善品種
      </label>
    </div>
    <div class="plants-grid" id="plants-list"></div>
  </div>
</div>

<script>
const DB = [
  {id:"SUC-001",name:"乙女心",emoji:"🌸",taxonomy:{species:"Echeveria subsessilis",family:"景天科",genus:"擬石蓮屬"},difficulty:2,diffLabel:"★★☆☆☆",petSafe:true,

  {id:"SUC-002",name:"熊童子",emoji:"🐻",taxonomy:{species:"Cotyledon tomentosa",family:"景天科",genus:"銀波錦屬"},difficulty:2,diffLabel:"★★☆☆☆",petSafe:true,

   care:{sunlight:"散射光 / 遮陰（忌直射）",water:"14 天 1 次",soil:"多肉專用排水介質",temp:"耐熱 30°C，耐寒 5°C",repot:"每 2 年換盆"},

   tips:["強光直射會造成葉尖褐化，請放置於散射光環境","夏季需特別注意通風，避免悶熱","比其他多肉更耐陰，非常適合室內擺放"]},

function getStars(n){return'★'.repeat(n)+'☆'.repeat(5-n)}

function renderResult(plant){

  section.style.display = 'block';

          <div class="care-item__val">${plant.care.sunlight}</div>

          <div class="care-item__val">${plant.care.repot}</div>
          <div class="care-item__sub">建議使用：${plant.care.soil}</div>
        </div>
      </div>

      <div class="result-desc">${plant.desc}</div>

      <div class="result-tips">
        <p class="result-tips__title">照護小技巧</p>
        ${plant.tips.map(t=>`<div class="tip-item"><span>•</span><span>${t}</span></div>`).join('')}
      </div>

      <div class="result-actions">
        <a href="product.html" class="btn btn--primary">選購此植物</a>
        <button class="btn btn--outline" onclick="clearResult()">重新查詢</button>
      </div>
    </div>`;
  section.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderNotFound(q){
  const section = document.getElementById('result-section');
  section.style.display = 'block';
  section.innerHTML = `
    <div class="result-card">
      <div class="not-found">
        <p>🌵</p>
        <p>找不到「${q}」的照護資訊</p>
        <p style="font-size:0.78rem;color:var(--text-light);margin-top:8px">
          目前收錄：乙女心、熊童子、姬玉露、霜之朝、黑王子、桃之嬌
        </p>
      </div>
    </div>`;
}

function clearResult(){
  document.getElementById('result-section').style.display='none';
  document.getElementById('plant-input').value='';
  document.getElementById('plant-input').focus();
}

function search(){
  const q = document.getElementById('plant-input').value.trim();
  if(!q) return;
  const match = DB.find(p=>p.name.includes(q)||(p.taxonomy?.species.toLowerCase().includes(q.toLowerCase())));
  if(match) renderResult(match); else renderNotFound(q);
}

document.getElementById('search-btn').addEventListener('click',search);
document.getElementById('plant-input').addEventListener('keydown',e=>{if(e.key==='Enter')search();});
document.querySelectorAll('.search-tag').forEach(tag=>{
  tag.addEventListener('click',()=>{
    document.getElementById('plant-input').value=tag.dataset.q;
    search();
  });
});

// 植物列表
function renderList(){
  const grid = document.getElementById('plants-list');
  const list = petOnly ? DB.filter(p=>p.petSafe) : DB;
  grid.innerHTML = list.map(p=>`
    <div class="plant-row" data-name="${p.name}">
      <div class="plant-row__emoji">${p.emoji}</div>
      <div class="plant-row__info">
        <p class="plant-row__name">${p.name}</p>
        <p class="plant-row__meta">${p.taxonomy.species}</p>
        <div class="plant-row__tags">
          <span class="${p.petSafe?'plant-row__safe':'plant-row__unsafe'}">${p.petSafe?'🐾 寵物友善':'⚠️ 需注意'}</span>
          <span class="plant-row__diff">${p.diffLabel}</span>
        </div>
      </div>
      <svg class="plant-row__arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>`).join('');

  grid.querySelectorAll('.plant-row').forEach(row=>{
    row.addEventListener('click',()=>{
      document.getElementById('plant-input').value=row.dataset.name;
      search();
      document.querySelector('.search-section').scrollIntoView({behavior:'smooth'});
    });
  });
}

document.getElementById('pet-only').addEventListener('change',e=>{petOnly=e.target.checked;renderList();});

// 導覽列
window.addEventListener('scroll',()=>{
  const nav=document.getElementById('nav');
  nav.style.background=window.scrollY>40?'rgba(245,242,238,0.96)':'rgba(245,242,238,0.9)';
  nav.style.boxShadow=window.scrollY>40?'0 4px 20px rgba(0,0,0,0.05)':'none';
});

renderList();
</script>
</body>
</html>
