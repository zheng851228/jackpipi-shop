<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>照護助手 — 陽光花園 jackpipi</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
/* ── 核心變數與基礎樣式 ── */
:root {
  --sage:#A8B5A2; --moss:#6B7C5C; --forest:#3D5040; --deep-forest:#253228;
  --sand:#E8DDD0; --sand-light:#F5F0EA; --terracotta:#B5704F;
  --cream:#FAF7F2; --bg:#F5F2EE; --white:#FFFFFF; --text:#2E2E2E; --text-muted:#7A7A7A; --text-light:#ABABAB;
  --border:rgba(107,124,92,0.15); --font-serif:'Noto Serif TC',serif;
  --font-display:'Cormorant Garamond',serif; --font-mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-serif);background:var(--bg);color:var(--text);line-height:1.7;}
a{color:inherit;text-decoration:none}
.container{max-width:1100px;margin:0 auto;padding:0 24px}

/* ── 導覽列 ── */
.nav{position:fixed;top:0;width:100%;z-index:100;height:72px;background:rgba(245,242,238,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;}
.nav__inner{display:flex;align-items:center;justify-content:space-between;width:100%}

/* ── 頁面標頭與搜尋 ── */
.page-header{padding:140px 0 70px;background:linear-gradient(135deg,#e8ede6 0%,var(--sand-light) 50%,var(--bg) 100%);text-align:center;}
.search-box{background:var(--white);border-radius:20px;padding:40px;box-shadow:0 8px 32px rgba(61,80,64,0.1);border:1px solid var(--border);max-width:680px;margin:-40px auto 40px;position:relative;z-index:10}
.search-row{display:flex;gap:12px;margin-top:10px;}
.search-input{flex:1;padding:14px 18px;border:1.5px solid var(--border);border-radius:99px;font-family:var(--font-serif);font-size:0.95rem;outline:none;}
.search-input:focus{border-color:var(--moss);}
.search-btn{padding:14px 28px;background:var(--forest);color:var(--cream);border-radius:99px;border:none;cursor:pointer;}
.search-hint{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px;font-size:0.78rem;}
.search-tag{padding:4px 12px;border-radius:99px;background:var(--sand-light);color:var(--text-muted);cursor:pointer;}

/* ── 搜尋結果卡片 ── */
.result-section{max-width:680px;margin:0 auto 60px;display:none;}
.result-card{background:var(--white);border-radius:20px;padding:36px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(61,80,64,0.08);}
.result-header{display:flex;align-items:center;gap:20px;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.result-emoji{font-size:3.2rem;width:72px;height:72px;display:flex;align-items:center;justify-content:center;background:var(--sand-light);border-radius:16px;overflow:hidden;}
.result-emoji img{width:100%;height:100%;object-fit:cover;}
.care-grid-result{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
.care-item{background:var(--sand-light);border-radius:12px;padding:16px}
.care-item__label{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-muted);margin-bottom:4px}
.btn-primary{display:inline-block;padding:10px 24px;background:var(--forest);color:var(--cream);border-radius:99px;font-size:0.86rem;}

/* ── 所有植物列表 ── */
.plants-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;padding-bottom:100px;}
.plant-row{display:flex;align-items:center;gap:16px;background:var(--white);border-radius:16px;padding:18px 20px;border:1px solid var(--border);cursor:pointer;transition:0.3s;}
.plant-row:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(61,80,64,0.08);}
.plant-row__emoji{font-size:2rem;width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:var(--sand-light);border-radius:12px;overflow:hidden;}
.plant-row__emoji img{width:100%;height:100%;object-fit:cover;}
.tag{padding:2px 8px;border-radius:99px;font-size:0.65rem;font-family:var(--font-mono);}
.tag--safe{background:rgba(107,124,92,0.1);color:var(--moss);}
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav__inner">
    <a href="index.html" style="font-weight:700; color:var(--forest);">陽光花園 jackpipi</a>
    <div style="display:flex; gap:20px; font-size:0.88rem; color:var(--text-muted);">
      <a href="product.html">所有植物</a>
      <a href="pet.html" style="color:var(--forest);">照護助手</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1 style="font-family:var(--font-display); font-size:3.5rem; color:var(--deep-forest);">你的植物<br><em>還好嗎？</em></h1>
  <p style="color:var(--text-muted); margin-top:10px;">輸入名稱查詢日照、澆水建議，以及毛孩安全標示。</p>
</div>

<div class="container">
  <div class="search-box">
    <label style="font-family:var(--font-mono); font-size:0.72rem; color:var(--text-muted);">輸入植物名稱或學名</label>
    <div class="search-row">
      <input type="text" id="plant-input" class="search-input" placeholder="例：乙女心、熊童子..." autocomplete="off"/>
      <button class="search-btn" id="search-btn">查詢</button>
    </div>
    <div class="search-hint" id="hint-container">
      <span style="color:var(--text-light)">載入快速標籤中...</span>
    </div>
  </div>

  <div class="result-section" id="result-section"></div>
</div>

<div class="container" style="border-top:1px solid var(--border); margin:40px auto;"></div>

<div class="container">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
    <h2 style="font-family:var(--font-display); font-size:2rem; color:var(--deep-forest);">所有<em>照護圖鑑</em></h2>
    <label style="font-size:0.82rem; color:var(--text-muted); cursor:pointer;">
      <input type="checkbox" id="pet-only"/> 只顯示寵物友善品種
    </label>
  </div>
  <div class="plants-grid" id="plants-list">
    <div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-muted);">圖鑑資料同步中...🌿</div>
  </div>
</div>

<script type="module">
import { db } from "./firebase-config.js";
import { collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const escapeHTML = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
  "&": "&amp;",
  "<": "&lt;",
  ">": "&gt;",
  '"': "&quot;",
  "'": "&#39;"
}[ch]));

function safeImageUrl(url) {
  try {
    const parsed = new URL(url, window.location.href);
    return parsed.protocol === "https:" || parsed.protocol === "http:";
  } catch {
    return false;
  }
}

let dbPlants = [];
let petOnly = false;

// 1. 實時連線資料庫
function initAssistant() {
  const q = query(collection(db, "products"), where("active", "==", true));
  
  onSnapshot(q, (snapshot) => {
    dbPlants = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderList();
    renderHints();
  }, (error) => {
    console.error("Firebase 讀取錯誤：", error);
    document.getElementById('plants-list').innerHTML = `<p style="color:red">圖鑑載入失敗：${escapeHTML(error.message)}</p>`;
  });
}

// 2. 渲染下方清單
function renderList() {
  const grid = document.getElementById('plants-list');
  const filtered = petOnly ? dbPlants.filter(p => p.petSafe) : dbPlants;
  
  if(filtered.length === 0){
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#888;">目前沒有符合的圖鑑資料。</div>';
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const media = safeImageUrl(p.imageUrl) ? `<img src="${escapeHTML(p.imageUrl)}" alt="${escapeHTML(p.name)}">` : escapeHTML(p.emoji || '🌿');
    return `
      <div class="plant-row lookup-btn" data-id="${escapeHTML(p.id)}">
        <div class="plant-row__emoji">${media}</div>
        <div>
          <p style="font-weight:500; color:var(--deep-forest); margin-bottom:4px;">${escapeHTML(p.name)}</p>
          ${p.petSafe ? '<span class="tag tag--safe">🐾 寵物友善</span>' : '<span class="tag" style="background:#f5e6e1; color:var(--terracotta)">⚠️ 需注意</span>'}
        </div>
      </div>
    `;
  }).join('');
}

// 3. 渲染快速標籤
function renderHints() {
  const hintContainer = document.getElementById('hint-container');
  const hints = dbPlants.slice(0, 5); // 取前五筆當快速標籤
  if(hints.length === 0) {
    hintContainer.innerHTML = '';
    return;
  }
  hintContainer.innerHTML = '<span style="color:var(--text-light)">快速查詢：</span>' + 
    hints.map(p => `<span class="search-tag hint-btn" data-name="${escapeHTML(p.name)}">${escapeHTML(p.name)}</span>`).join('');
}

// 4. 搜尋與顯示結果邏輯
function search() {
  const q = document.getElementById('plant-input').value.trim().toLowerCase();
  const section = document.getElementById('result-section');
  if(!q) return;

  const match = dbPlants.find(p => 
    String(p.name || '').toLowerCase().includes(q) || (p.species && p.species.toLowerCase().includes(q))
  );

  if(match) {
    showResult(match);
  } else {
    section.style.display = 'block';
    section.innerHTML = `
      <div class="result-card" style="text-align:center;">
        <p style="font-size:2rem; margin-bottom:10px;">🌵</p>
        <p style="color:var(--text-muted);">找不到「${escapeHTML(q)}」的相關照護資訊</p>
      </div>`;
  }
}

function showResult(p) {
  const section = document.getElementById('result-section');
  section.style.display = 'block';
  
  const media = safeImageUrl(p.imageUrl) ? `<img src="${escapeHTML(p.imageUrl)}" alt="${escapeHTML(p.name)}">` : escapeHTML(p.emoji || '🌿');
  
  // 處理防呆：如果後台沒填寫照護參數，給予預設值
  const sun = p.careSun || '半日照 / 散射光';
  const water = p.careWater || '視介質乾燥程度而定';
  const temp = p.careTemp || '請避免極端高低溫';
  const desc = p.desc || '這是一株美麗的植物，詳細照護指南建置中。';

  section.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-emoji">${media}</div>
        <div>
          <h2 style="font-size:1.4rem; color:var(--deep-forest); margin-bottom:5px;">${escapeHTML(p.name)}</h2>
          <p style="font-family:var(--font-display); font-style:italic; color:var(--text-light); margin-bottom:8px;">${escapeHTML(p.species || '未知學名')}</p>
          ${p.petSafe ? '<span class="tag tag--safe">🐾 寵物友善</span>' : '<span class="tag" style="background:#f5e6e1; color:var(--terracotta)">⚠️ 需注意</span>'}
        </div>
      </div>
      <div class="care-grid-result">
        <div class="care-item"><div class="care-item__label">☀️ 日照需求</div><div style="font-weight:500;">${escapeHTML(sun)}</div></div>
        <div class="care-item"><div class="care-item__label">💧 澆水頻率</div><div style="font-weight:500;">${escapeHTML(water)}</div></div>
        <div class="care-item"><div class="care-item__label">🌡️ 適合溫度</div><div style="font-weight:500;">${escapeHTML(temp)}</div></div>
      </div>
      <div style="padding:16px; background:var(--sand-light); border-left:3px solid var(--moss); margin-bottom:20px; font-size:0.9rem; color:var(--text-muted);">
        ${escapeHTML(desc)}
      </div>
      <a href="product.html" class="btn-primary">前往植物室選購</a>
    </div>`;
  section.scrollIntoView({behavior:'smooth', block:'center'});
}

// 5. 安全綁定所有事件 (Event Delegation)
document.getElementById('search-btn').addEventListener('click', search);

document.getElementById('plant-input').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') search();
});

document.getElementById('pet-only').addEventListener('change', (e) => {
  petOnly = e.target.checked;
  renderList();
});

// 監聽快速標籤與下方圖鑑點擊
document.body.addEventListener('click', (e) => {
  const hintBtn = e.target.closest('.hint-btn');
  if(hintBtn) {
    document.getElementById('plant-input').value = hintBtn.dataset.name;
    search();
  }

  const lookupBtn = e.target.closest('.lookup-btn');
  if(lookupBtn) {
    const p = dbPlants.find(x => x.id === lookupBtn.dataset.id);
    if(p) showResult(p);
  }
});

// 啟動系統
initAssistant();
</script>

</body>
</html>
