<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>結帳 — 陽光花園 jackpipi</title>
  
  <link rel="stylesheet" href="global.css" />
  
  <style>
    /* ── 結帳頁專屬樣式 ── */
    .checkout-wrap { padding: calc(var(--nav-h) + 40px) 0 80px; }
    .checkout-layout { display: grid; grid-template-columns: 1fr 380px; gap: 40px; align-items: start; }

    /* 步驟面板 */
    .step-panel { display: none; }
    .step-panel.active { display: block; animation: panelIn .3s ease forwards; }
    @keyframes panelIn { from{opacity:0; transform:translateX(16px)} to{opacity:1; transform:translateX(0)} }

    /* 訂單摘要 (右側) */
    .order-summary { 
      background: var(--white); border-radius: var(--r-lg); padding: 28px; 
      box-shadow: var(--shadow-sm); border: 1px solid var(--border); 
      position: sticky; top: calc(var(--nav-h) + 20px); 
    }
    .os-items { max-height: 280px; overflow-y: auto; margin-bottom: 18px; }
    .os-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .os-thumb { 
      width: 44px; height: 44px; border-radius: var(--r-md); background: var(--sand-light); 
      display: flex; align-items: center; justify-content: center; font-size: 1.3rem; position: relative; 
    }
    .os-qty { 
      position: absolute; top: -4px; right: -4px; width: 16px; height: 16px; 
      background: var(--forest); color: #fff; border-radius: 50%; font-size: 0.6rem; 
      display: flex; align-items: center; justify-content: center; 
    }

    /* 配送與付款選項 */
    .opt-card { 
      display: flex; align-items: center; gap: 14px; padding: 16px; 
      border: 1.5px solid var(--border); border-radius: var(--r-md); 
      cursor: pointer; transition: var(--t); margin-bottom: 10px;
    }
    .opt-card:hover { border-color: var(--sage); }
    .opt-card.selected { border-color: var(--moss); background: rgba(107,124,92,0.05); }
    .opt-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); position: relative; }
    .opt-card.selected .opt-dot::after { content:''; position: absolute; inset: 3px; background: var(--moss); border-radius: 50%; }

    @media(max-width: 900px) {
      .checkout-layout { grid-template-columns: 1fr; }
      .order-summary { position: static; }
    }
  </style>
</head>

<body data-page="checkout">
  <div class="checkout-wrap">
    <div class="container">
      <div class="checkout-layout">

        <main>
          <div class="step-panel active" id="step-1">
            <h2 class="section-title">確認<em>購物車</em></h2>
            <div id="cart-review-list" style="margin: 24px 0;"></div>
            <div class="btn-group" style="display:flex; gap:12px;">
              <button class="btn btn--primary" id="go-to-2">填寫收件資料</button>
              <a href="product.html" class="btn btn--outline">繼續購物</a>
            </div>
          </div>

          <div class="step-panel" id="step-2">
            <h2 class="section-title">收件<em>資訊</em></h2>
            <div class="card" style="margin-top:24px;">
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;">
                <div><label class="form-label">收件人姓名 *</label><input class="form-input" id="f-name"></div>
                <div><label class="form-label">聯絡電話 *</label><input class="form-input" id="f-phone" placeholder="09xx-xxx-xxx"></div>
              </div>
              <div class="form-group" style="margin-bottom:20px;">
                <label class="form-label">Email *</label>
                <input class="form-input" id="f-email">
              </div>
              <div class="form-group">
                <label class="form-label">配送地址 *</label>
                <input class="form-input" id="f-addr" placeholder="請輸入詳細地址">
              </div>
            </div>

            <h3 style="margin: 32px 0 16px; font-family:var(--font-serif);">付款方式</h3>
            <div class="pay-options">
              <div class="opt-card selected" data-pay="transfer"><div class="opt-dot"></div><div><strong>ATM 轉帳</strong><p style="font-size:0.75rem; color:var(--text-muted)">匯款後請告知帳號末五碼</p></div></div>
              <div class="opt-card" data-pay="cod"><div class="opt-dot"></div><div><strong>貨到付款</strong><p style="font-size:0.75rem; color:var(--text-muted)">另收 30 元手續費</p></div></div>
            </div>

            <div class="btn-group" style="display:flex; gap:12px; margin-top:32px;">
              <button class="btn btn--primary" id="btn-submit">確認送出訂單</button>
              <button class="btn btn--outline" id="back-to-1">返回上一步</button>
            </div>
          </div>

          <div class="step-panel" id="step-success">
            <div style="text-align:center; padding:60px 0;">
              <div style="font-size:4rem; margin-bottom:20px;">🌿</div>
              <h2 class="section-title">訂單已<em>成立</em></h2>
              <p style="color:var(--text-muted); margin: 16px 0 32px;">感謝您的訂購！我們將儘速為您安排出貨。</p>
              <a href="member.html#orders" class="btn btn--primary">查看我的訂單</a>
            </div>
          </div>
        </main>

        <aside class="order-summary" id="summary-sidebar">
          <p style="font-family:var(--font-mono); font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; margin-bottom:16px; border-bottom:1px solid var(--border); padding-bottom:8px;">訂單摘要</p>
          <div class="os-items" id="os-items"></div>
          <div style="border-top: 1px solid var(--border); padding-top:16px; margin-top:16px;">
            <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:8px;"><span>商品小計</span><span id="os-sub">NT$ 0</span></div>
            <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:8px;"><span>運費</span><span id="os-ship">NT$ 100</span></div>
            <div style="display:flex; justify-content:space-between; font-weight:700; font-size:1.1rem; color:var(--forest); margin-top:12px; border-top:1px solid var(--border); padding-top:12px;">
              <span>總計</span><span id="os-total">NT$ 0</span>
            </div>
          </div>
        </aside>

      </div>
    </div>
  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="global.js"></script>
  <script type="module">
    import { db, auth } from "./firebase-config.js";
    import { Cart, showToast } from "./global.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    let currentUser = null;
    let selectedPay = 'transfer';
    let shipFee = 100;

    // 1. 初始化與監聽 Auth 預填資料
    onAuthStateChanged(auth, user => {
      if (user) {
        currentUser = user;
        document.getElementById('f-name').value = user.displayName || '';
        document.getElementById('f-email').value = user.email || '';
      }
    });

    // 2. 渲染訂單摘要
    function refreshSummary() {
      const items = Cart.get();
      const sub = Cart.subtotal(items);
      
      document.getElementById('os-items').innerHTML = items.map(i => `
        <div class="os-item">
          <div class="os-thumb">
            ${i.imageUrl ? `<img src="${i.imageUrl}" style="width:100%; height:100%; object-fit:cover; border-radius:4px;">` : i.emoji}
            <span class="os-qty">${i.qty}</span>
          </div>
          <div style="flex:1">
            <p style="font-size:0.85rem; font-weight:500;">${i.name}</p>
            <p style="font-size:0.7rem; color:var(--text-light);">${i.size}</p>
          </div>
          <p style="font-family:var(--font-mono); font-size:0.85rem;">NT$ ${i.price * i.qty}</p>
        </div>
      `).join('');

      document.getElementById('os-sub').textContent = `NT$ ${sub.toLocaleString()}`;
      document.getElementById('os-ship').textContent = `NT$ ${shipFee}`;
      document.getElementById('os-total').textContent = `NT$ ${(sub + shipFee).toLocaleString()}`;
      
      // Step 1 的列表也同步渲染
      document.getElementById('cart-review-list').innerHTML = document.getElementById('os-items').innerHTML;
    }

    // 3. 步驟切換邏輯
    document.getElementById('go-to-2').onclick = () => {
      if (Cart.get().length === 0) return showToast("您的購物車是空的喔！");
      document.getElementById('step-1').classList.remove('active');
      document.getElementById('step-2').classList.add('active');
      window.scrollTo(0,0);
    };

    document.getElementById('back-to-1').onclick = () => {
      document.getElementById('step-2').classList.remove('active');
      document.getElementById('step-1').classList.add('active');
    };

    // 4. 付款方式切換
    document.querySelectorAll('.opt-card').forEach(card => {
      card.onclick = () => {
        document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedPay = card.dataset.pay;
        shipFee = selectedPay === 'cod' ? 130 : 100; // 貨到付款加 30
        refreshSummary();
      };
    });

    // 5. 提交訂單到 Firebase
    document.getElementById('btn-submit').onclick = async () => {
      const name = document.getElementById('f-name').value.trim();
      const phone = document.getElementById('f-phone').value.trim();
      const addr = document.getElementById('f-addr').value.trim();

      if (!name || !phone || !addr) return alert("請填寫完整的收件資訊！");

      const btn = document.getElementById('btn-submit');
      btn.disabled = true;
      btn.textContent = "處理中...";

      try {
        const orderData = {
          userId: currentUser ? currentUser.uid : 'guest',
          customer: { name, phone, email: document.getElementById('f-email').value, addr },
          items: Cart.get(),
          subtotal: Cart.subtotal(),
          shipFee: shipFee,
          total: Cart.subtotal() + shipFee,
          payment: selectedPay,
          status: "待處理",
          createdAt: serverTimestamp()
        };

        await addDoc(collection(db, "orders"), orderData);
        
        // 成功後清空購物車
        Cart.clear();
        document.getElementById('step-2').classList.remove('active');
        document.getElementById('summary-sidebar').style.display = 'none';
        document.getElementById('step-success').classList.add('active');
        showToast("✨ 訂單已成功送出！");

      } catch (e) {
        alert("訂單送出失敗：" + e.message);
        btn.disabled = false;
        btn.textContent = "確認送出訂單";
      }
    };

    // 初始渲染
    refreshSummary();
  </script>
</body>
</html>
