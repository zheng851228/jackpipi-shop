<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>管理後台 — 陽光花園 jackpipi</title>
  
  <link rel="stylesheet" href="global.css" />
  
  <style>
    /* ── 後台專屬佈局 ── */
    :root {
      --admin-sb-w: 240px;
    }
    body { background: var(--bg); display: flex; min-height: 100vh; }
    
    /* 側邊欄 */
    .sb { 
      width: var(--admin-sb-w); background: var(--deep-forest); color: var(--cream); 
      position: fixed; height: 100vh; padding: 32px 20px; z-index: 100;
    }
    .sb h2 { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: 40px; display: flex; align-items: center; gap: 8px; }
    .sb-nav { display: flex; flex-direction: column; gap: 8px; }
    .sb-link { 
      padding: 12px 16px; border-radius: var(--r-md); cursor: pointer; transition: var(--t); 
      font-size: 0.9rem; color: rgba(250,247,242,0.6); display: flex; align-items: center; gap: 10px;
    }
    .sb-link:hover, .sb-link.active { background: rgba(107,124,92,0.25); color: var(--cream); }
    .sb-logout { margin-top: auto; color: var(--blush); opacity: 0.8; }

    /* 主內容區 */
    .main { margin-left: var(--admin-sb-w); padding: 40px; width: 100%; flex: 1; }
    .card { 
      background: var(--white); border-radius: var(--r-lg); border: 1px solid var(--border); 
      padding: 32px; margin-bottom: 24px; box-shadow: var(--shadow-sm); 
    }
    
    /* 表單與表格 */
    .pg { display: none; } 
    .pg.on { display: block; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { text-align: left; padding: 14px; background: var(--sand-light); font-size: 0.8rem; font-family: var(--font-mono); color: var(--moss); }
    td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    
    .fi { 
      width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: var(--r-md); 
      margin-top: 6px; margin-bottom: 18px; outline: none; transition: var(--t);
    }
    .fi:focus { border-color: var(--moss); box-shadow: 0 0 0 3px rgba(107,124,92,0.1); }
    
    .img-prev { 
      width: 120px; height: 120px; object-fit: cover; border-radius: var(--r-md); 
      background: var(--sand-light); margin-bottom: 12px; display: none; border: 1px solid var(--border);
    }
    
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .kpi-card h3 { font-size: 0.75rem; font-family: var(--font-mono); color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
    .kpi-card h1 { font-family: var(--font-display); font-size: 2.5rem; font-weight: 300; color: var(--forest); }
  </style>
</head>
<body>

  <aside class="sb">
    <h2>陽光花園 🌿</h2>
    <nav class="sb-nav">
      <div class="sb-link active" onclick="go('dashboard')">🏠 儀表板總覽</div>
      <div class="sb-link" onclick="go('products')">🌿 商品清單管理</div>
      <div class="sb-link" onclick="go('add-product')">➕ 新增植栽選品</div>
      <div style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;"></div>
      <div class="sb-link sb-logout" id="btn-logout">🚪 登出系統</div>
    </nav>
  </aside>

  <main class="main">
    
    <div class="pg on" id="pg-dashboard">
      <h2 class="page-title" style="margin-bottom:24px">營運<em>概況</em></h2>
      <div class="kpi-grid">
        <div class="card kpi-card"><h3>總上架商品</h3><h1 id="kpi-pr">0</h1></div>
        <div class="card kpi-card"><h3>庫存告急</h3><h1 id="kpi-out" style="color:var(--terracotta)">0</h1></div>
      </div>
    </div>

    <div class="pg" id="pg-products">
      <div class="card">
        <h3 style="margin-bottom:10px">商品清單</h3>
        <table>
          <thead><tr><th>商品名稱</th><th>售價</th><th>庫存</th><th>狀態</th></tr></thead>
          <tbody id="p-body"></tbody>
        </table>
      </div>
    </div>

    <div class="pg" id="pg-add-product">
      <div class="card" style="max-width:800px;">
        <h3 style="margin-bottom: 24px; color: var(--deep-forest);">新增植栽選品</h3>
        
        <div id="panel-upload" style="margin-bottom: 24px; padding: 20px; background: var(--sand-light); border-radius: var(--r-md);">
          <label class="form-label">商品照片</label>
          <img class="img-prev" id="img-prev">
          <input type="file" id="pf-file" accept="image/*" class="fi" style="margin-bottom:0; background:transparent; border:none; padding:0;">
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
          <div><label class="form-label">商品名稱 *</label><input class="fi" id="pf-name" placeholder="如：乙女心"></div>
          <div>
            <label class="form-label">分類 *</label>
            <select class="fi" id="pf-category">
              <option value="beginner">🌱 新手入門</option>
              <option value="collector">🪴 資深玩家</option>
              <option value="media-tools">🪣 介質與工具</option>
            </select>
          </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
          <div><label class="form-label">售價 (NT$) *</label><input class="fi" type="number" id="pf-price"></div>
          <div><label class="form-label">原始價格 (特價顯示用)</label><input class="fi" type="number" id="pf-originalPrice"></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
          <div><label class="form-label">庫存數量 *</label><input class="fi" type="number" id="pf-stock" value="10"></div>
          <div><label class="form-label">預設 Emoji (無圖時顯示)</label><input class="fi" id="pf-emoji" value="🌿"></div>
        </div>

        <div style="margin: 15px 0; display:flex; gap:24px; align-items: center;">
          <label style="cursor: pointer;"><input type="checkbox" id="pf-featured"> 🔥 熱銷精選</label>
          <label style="cursor: pointer;"><input type="checkbox" id="pf-petSafe"> 🐾 寵物友善</label>
          <label style="cursor: pointer;"><input type="checkbox" id="pf-active" checked> 立即上架</label>
        </div>

        <div>
          <label class="form-label">商品描述</label>
          <textarea class="fi" id="pf-desc" rows="3" placeholder="介紹這株植物的特色..."></textarea>
        </div>

        <div style="margin-top:30px; border-top:1px solid var(--border); padding-top:30px;">
          <h4 style="color:var(--forest); margin-bottom:20px;">🌿 照護圖鑑資訊 (選填)</h4>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div><label class="form-label">學名</label><input class="fi" id="pf-species" placeholder="Echeveria..."></div>
            <div><label class="form-label">日照</label><input class="fi" id="pf-sun" placeholder="半日照..."></div>
            <div><label class="form-label">澆水</label><input class="fi" id="pf-water" placeholder="每週一次..."></div>
            <div><label class="form-label">適合溫度</label><input class="fi" id="pf-temp" placeholder="20-30°C"></div>
          </div>
        </div>

        <button class="btn btn--primary btn--full" id="btn-save" style="margin-top:20px;">儲存並發布商品</button>
      </div>
    </div>
  </main>

<script type="module">
// 引入統一設定
import { db, storage, auth } from "./firebase-config.js";
import { collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const $ = id => document.getElementById(id);
let imgFile = null;

// 路由切換
window.go = n => {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  $(`pg-${n}`).classList.add('on');
  document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
  // 這裡需要根據點擊目標加 active，簡易做法是找 text 包含關鍵字的
};

// 圖片預覽處理
$('pf-file').onchange = e => {
  imgFile = e.target.files[0];
  if (!imgFile) return;
  const reader = new FileReader();
  reader.onload = event => { 
    $('img-prev').src = event.target.result; 
    $('img-prev').style.display = 'block'; 
  };
  reader.readAsDataURL(imgFile);
};

// 登出
$('btn-logout').onclick = () => {
  signOut(auth).then(() => { window.location.href = 'member.html'; });
};

// 儲存商品
$('btn-save').onclick = async () => {
  const name = $('pf-name').value.trim();
  const price = parseFloat($('pf-price').value);
  if(!name || isNaN(price)) return alert('請填寫商品名稱與售價！');

  const btn = $('btn-save');
  btn.disabled = true;
  btn.textContent = '處理中...';

  try {
    let imageUrl = '';
    // 如果有選圖片，上傳到 Storage
    if(imgFile) {
      const fileName = `${Date.now()}_${imgFile.name}`;
      const storageRef = ref(storage, `products/${fileName}`);
      const uploadTask = await uploadBytesResumable(storageRef, imgFile);
      imageUrl = await getDownloadURL(uploadTask.ref);
    }

    const productData = {
      name,
      category: $('pf-category').value,
      price: price,
      originalPrice: parseFloat($('pf-originalPrice').value) || price,
      stock: parseInt($('pf-stock').value) || 0,
      emoji: $('pf-emoji').value,
      imageUrl,
      featured: $('pf-featured').checked,
      petSafe: $('pf-petSafe').checked,
      active: $('pf-active').checked,
      desc: $('pf-desc').value,
      species: $('pf-species').value,
      careSun: $('pf-sun').value,
      careWater: $('pf-water').value,
      careTemp: $('pf-temp').value,
      updatedAt: serverTimestamp()
    };

    await addDoc(collection(db, 'products'), productData);
    alert('✅ 商品已成功上架！');
    
    // 清空表單
    document.querySelectorAll('.fi').forEach(el => el.value = '');
    $('img-prev').style.display = 'none';
    imgFile = null;
    go('products');

  } catch (error) {
    alert('儲存失敗：' + error.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '儲存並發布商品';
  }
};

// 實時監聽數據與更新 KPI
onSnapshot(collection(db, 'products'), snapshot => {
  const products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  
  // 更新 KPI
  $('kpi-pr').textContent = products.length;
  $('kpi-out').textContent = products.filter(p => p.stock <= 0).length;

  // 更新表格
  $('p-body').innerHTML = products.map(p => `
    <tr>
      <td>
        <div style="display:flex; align-items:center; gap:10px;">
          <div style="width:32px; height:32px; border-radius:4px; background:var(--sand-light); display:flex; align-items:center; justify-content:center; font-size:1.2rem; overflow:hidden;">
            ${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%; height:100%; object-fit:cover;">` : p.emoji}
          </div>
          <div>
            <strong style="display:block">${p.name}</strong>
            <small style="color:var(--text-muted)">${p.category}</small>
          </div>
        </div>
      </td>
      <td style="font-family:var(--font-mono)">NT$ ${p.price}</td>
      <td style="font-family:var(--font-mono)">${p.stock}</td>
      <td>
        <span class="badge" style="background:${p.stock > 0 ? 'var(--success)' : 'var(--terracotta)'}; position:static; font-size:0.65rem;">
          ${p.stock > 0 ? '供應中' : '缺貨'}
        </span>
      </td>
    </tr>
  `).join('');
});

</script>
</body>
</html>
