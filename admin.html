<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>後台管理 — 陽光花園 jackpipi</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --moss:#6B7C5C;--forest:#3D5040;--deep:#1e2e22;--deep2:#253228;
  --sand:#E8DDD0;--sand-light:#F5F0EA;--blush:#D4A8A0;--terra:#B5704F;
  --cream:#FAF7F2;--bg:#f2f4f0;--white:#fff;--text:#1e2a1f;
  --muted:#6b7a6c;--light:#a8b5a8;
  --border:#e0e8df;
  --sh-sm:0 1px 4px rgba(30,46,34,.06),0 4px 16px rgba(30,46,34,.06);
  --sh-md:0 4px 12px rgba(30,46,34,.08),0 12px 32px rgba(30,46,34,.08);
  --r:10px;--r-lg:14px;--r-full:999px;
  --serif:'Noto Serif TC',serif;--mono:'DM Mono',monospace;
  --ease:.22s cubic-bezier(.4,0,.2,1);
  --sidebar:240px;--topbar:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--deep);display:flex;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:16px}
.ls-icon{font-size:2.4rem;animation:lsPulse 1.5s infinite}
@keyframes lsPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.9)}}

/* LAYOUT */
#sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:none;backdrop-filter:blur(2px)}
.sb{width:var(--sidebar);background:var(--deep);color:var(--cream);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform 0.3s var(--ease)}
.main{margin-left:var(--sidebar);flex:1;min-height:100vh;transition:margin 0.3s var(--ease)}
.topbar{height:var(--topbar);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:50}
.menu-btn{display:none;width:40px;height:40px;align-items:center;justify-content:center;margin-right:12px;border-radius:8px;border:1px solid var(--border)}

/* UI COMPONENTS */
.card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--sh-sm);margin-bottom:16px;overflow:hidden}
.card-hd{padding:16px 20px;background:#fafbfa;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.content{padding:20px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--white);padding:20px;border-radius:var(--r-lg);border:1px solid var(--border);text-align:center}
.kpi-num{font-family:var(--mono);font-size:2rem;color:var(--forest);font-weight:700}
.kpi-label{font-size:.75rem;color:var(--muted);margin-top:4px}

/* FORM */
.fg{margin-bottom:16px}
.fl{display:block;font-size:.75rem;color:var(--muted);margin-bottom:6px;font-family:var(--mono)}
.fi{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--r);background:#fafbfa;outline:none;font-size:1rem}
.fi:focus{border-color:var(--moss);background:var(--white)}
.btn-p{width:100%;padding:14px;background:var(--forest);color:white;border-radius:var(--r-full);font-size:1rem;font-weight:600;margin-top:10px;cursor:pointer;transition:all .2s}
.btn-p:disabled{opacity:0.6;cursor:not-allowed}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:500px}
th{text-align:left;padding:12px 16px;background:#f8faf8;font-size:.7rem;color:var(--muted)}
td{padding:14px 16px;border-bottom:1px solid #f0f4f0;font-size:.9rem}

/* SIDEBAR NAV */
.sb-item{padding:12px 20px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s}
.sb-item:hover, .sb-item.on{color:white;background:rgba(255,255,255,.05)}
.sb-item.on{border-left:4px solid var(--moss)}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--deep)}
.lc{background:white;padding:40px;border-radius:20px;width:90%;max-width:400px;text-align:center}

/* MOBILE */
@media(max-width:900px){
  .sb{transform:translateX(-100%)}
  .sb.open{transform:translateX(0)}
  #sb-overlay.open{display:block}
  .main{margin-left:0}
  .menu-btn{display:flex}
  .kpi-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="loading-screen"><div class="ls-icon">🌿</div></div>
<div id="sb-overlay" onclick="toggleSB(false)"></div>

<div id="login-screen">
  <div class="lc">
    <h2 style="color:var(--forest);margin-bottom:10px">陽光花園後台</h2>
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:24px">請登入管理員帳號</p>
    <div class="fg"><input class="fi" id="a-email" type="email" placeholder="Email"></div>
    <div class="fg"><input class="fi" id="a-pass" type="password" placeholder="密碼"></div>
    <button class="btn-p" id="btn-login">登入</button>
  </div>
</div>

<div id="admin">
  <aside class="sb" id="main-sb">
    <div style="padding:30px 20px"><h2 style="font-size:1.2rem">陽光花園 🌿</h2></div>
    <nav style="flex:1">
      <div class="sb-item on" data-pg="dashboard" onclick="go('dashboard')">🏠 儀表板</div>
      <div class="sb-item" data-pg="products" onclick="go('products')">🌿 商品列表</div>
      <div class="sb-item" data-pg="add-product" onclick="go('add-product')">➕ 新增商品</div>
      <div class="sb-item" data-pg="orders" onclick="go('orders')">📦 訂單管理</div>
    </nav>
    <div class="sb-item" onclick="handleLogout()" style="color:var(--blush);border-top:1px solid rgba(255,255,255,.05)">🚪 登出</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSB(true)">☰</button>
      <div style="font-weight:600;color:var(--forest)">陽光花園 › <span id="pg-title">儀表板</span></div>
    </div>

    <div class="content">
      <div class="pg" id="pg-dashboard">
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-label">總訂單</div><div class="kpi-num" id="kpi-o">0</div></div>
          <div class="kpi"><div class="kpi-label">上架商品</div><div class="kpi-num" id="kpi-p">0</div></div>
        </div>
        <div class="card">
            <div class="card-hd"><h3>系統狀態</h3></div>
            <div style="padding:20px;color:var(--muted)">歡迎回來！今天一切運行正常。</div>
        </div>
      </div>

      <div class="pg" id="pg-products" style="display:none">
        <div style="margin-bottom:15px;text-align:right">
            <button class="btn-p" style="width:auto;padding:8px 20px" onclick="go('add-product')">+ 新增商品</button>
        </div>
        <div class="card"><div class="tbl-wrap"><table><thead><tr><th>商品</th><th>售價</th><th>庫存</th></tr></thead><tbody id="p-list"></tbody></table></div></div>
      </div>

      <div class="pg" id="pg-add-product" style="display:none">
        <div class="card" style="max-width:600px;margin:0 auto">
          <div class="card-hd"><h3 id="form-title">新增商品</h3></div>
          <div style="padding:24px">
            <div class="fg"><label class="fl">商品名稱</label><input class="fi" id="pf-name" placeholder="例如：乙女心"></div>
            <div class="fg"><label class="fl">Emoji 圖示</label><input class="fi" id="pf-emoji" placeholder="🌵" maxlength="2"></div>
            <div class="fg"><label class="fl">售價 (NT$)</label><input class="fi" type="number" id="pf-price" placeholder="100"></div>
            <div class="fg"><label class="fl">庫存數量</label><input class="fi" type="number" id="pf-stock" placeholder="10"></div>
            <button class="btn-p" id="btn-save-prod">儲存商品</button>
            <button class="btn-p" style="background:#eee;color:#666;margin-top:10px" onclick="go('products')">取消</button>
          </div>
        </div>
      </div>
      
      <div id="pg-orders" class="pg" style="display:none;padding:20px;text-align:center;color:var(--muted)">訂單模組開發中...</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FB={apiKey:"AIzaSyC103Q-v31-z7nHnnM8KpIZbrrzjrGgGJ4",authDomain:"fir-config-f2e57.firebaseapp.com",projectId:"fir-config-f2e57",storageBucket:"fir-config-f2e57.firebasestorage.app",messagingSenderId:"860181486529",appId:"1:860181486529:web:6f7053a9141694afc66d40"};
const app=initializeApp(FB); const auth=getAuth(app); const db=getFirestore(app);
const ADMINS=["lucky851228@gmail.com"];

// 全域導航
window.toggleSB = (show) => {
    document.getElementById('main-sb').classList.toggle('open', show);
    document.getElementById('sb-overlay').classList.toggle('open', show);
};

window.go = (page) => {
    document.querySelectorAll('.pg').forEach(p => p.style.display='none');
    document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('on'));
    document.getElementById('pg-'+page).style.display='block';
    document.querySelector(`[data-pg="${page}"]`)?.classList.add('on');
    document.getElementById('pg-title').textContent = page.charAt(0).toUpperCase() + page.slice(1);
    toggleSB(false);
    if(page==='products') loadProducts();
    if(page==='dashboard') loadDash();
};

// 驗證狀態
onAuthStateChanged(auth, user => {
    document.getElementById('loading-screen').style.display='none';
    if(user && ADMINS.includes(user.email)) {
        document.getElementById('login-screen').style.display='none';
        document.getElementById('admin').classList.add('on');
        loadDash();
    } else {
        document.getElementById('login-screen').style.display='flex';
        document.getElementById('admin').classList.remove('on');
    }
});

// 登入 & 登出
document.getElementById('btn-login').onclick = async () => {
    const e = document.getElementById('a-email').value, p = document.getElementById('a-pass').value;
    try { await signInWithEmailAndPassword(auth, e, p); } catch(err) { alert('登入失敗：' + err.message); }
};
window.handleLogout = () => signOut(auth);

// 核心功能：新增商品 (修復點)
document.getElementById('btn-save-prod').onclick = async () => {
    const name = document.getElementById('pf-name').value;
    const price = document.getElementById('pf-price').value;
    const btn = document.getElementById('btn-save-prod');

    if(!name || !price) return alert('請輸入商品名稱與售價！');

    btn.disabled = true;
    btn.textContent = '處理中...';

    try {
        await addDoc(collection(db, 'products'), {
            name: name,
            emoji: document.getElementById('pf-emoji').value || '🌿',
            price: Number(price),
            stock: Number(document.getElementById('pf-stock').value) || 0,
            createdAt: serverTimestamp(),
            active: true
        });
        alert('✅ 商品上架成功！');
        // 重置表單
        ['pf-name','pf-emoji','pf-price','pf-stock'].forEach(id => document.getElementById(id).value = '');
        go('products');
    } catch(err) {
        alert('❌ 儲存失敗：' + err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '儲存商品';
    }
};

// 資料載入
async function loadDash() {
    const o = await getDocs(collection(db, 'orders'));
    const p = await getDocs(collection(db, 'products'));
    document.getElementById('kpi-o').textContent = o.size;
    document.getElementById('kpi-p').textContent = p.size;
}

async function loadProducts() {
    const snap = await getDocs(collection(db, 'products'));
    document.getElementById('p-list').innerHTML = snap.docs.map(d => {
        const p = d.data();
        return `<tr><td>${p.emoji} ${p.name}</td><td>NT$${p.price}</td><td>${p.stock}</td></tr>`;
    }).join('');
}
</script>
</body>
</html>
