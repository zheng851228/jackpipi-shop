<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>後台管理 — 陽光花園 jackpipi</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --moss:#6B7C5C;--forest:#3D5040;--deep:#1e2e22;--deep2:#253228;
  --sand:#E8DDD0;--sand-light:#F5F0EA;--blush:#D4A8A0;--terra:#B5704F;
  --cream:#FAF7F2;--bg:#f2f4f0;--white:#fff;--text:#1e2a1f;
  --muted:#6b7a6c;--light:#a8b5a8;
  --border:#e0e8df;
  --sh-sm:0 1px 4px rgba(30,46,34,.06),0 4px 16px rgba(30,46,34,.06);
  --sh-md:0 4px 12px rgba(30,46,34,.08),0 12px 32px rgba(30,46,34,.08);
  --r:10px;--r-lg:14px;--r-full:999px;
  --serif:'Noto Serif TC',serif;--mono:'DM Mono',monospace;
  --ease:.22s cubic-bezier(.4,0,.2,1);
  --sidebar:236px;--topbar:64px;
  --ok:#4d9155;--err:#b84c41;--warn:#c49a2a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:inherit}

/* LOADING SCREEN */
#loading-screen{position:fixed;inset:0;background:var(--deep);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:16px}
.ls-icon{font-size:2.4rem;animation:lsPulse 1.5s ease-in-out infinite}
@keyframes lsPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.9)}}

/* SIDEBAR & OVERLAY */
#sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:none;backdrop-filter:blur(2px)}
.sb{width:var(--sidebar);background:var(--deep);color:var(--cream);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform var(--ease)}

/* TOPBAR MOBILE */
.menu-toggle{display:none;width:40px;height:40px;align-items:center;justify-content:center;color:var(--forest);background:var(--white);border-radius:var(--r);border:1.5px solid var(--border);margin-right:12px}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--deep) 0%,#2d4a32 100%);padding:20px}
.lc{background:var(--white);border-radius:20px;padding:40px 30px;width:100%;max-width:400px;box-shadow:var(--sh-md)}
.lc-logo{text-align:center;margin-bottom:24px}
.lc-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--forest),var(--moss));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 12px}
.lc-badge{display:block;text-align:center;background:#f0f5f0;color:var(--moss);padding:6px;border-radius:var(--r-full);font-size:.7rem;margin-bottom:20px}
.lf-group{margin-bottom:16px}
.lf-input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:var(--r);background:#fafbfa;outline:none}
.btn-login{width:100%;padding:14px;background:var(--forest);color:var(--white);border-radius:var(--r-full);font-size:1rem;margin-top:10px}

/* ADMIN MAIN */
#admin{display:none}
#admin.on{display:flex;min-height:100vh}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;width:100%}
.topbar{height:var(--topbar);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:50}
.tb-bc{flex:1;font-size:.85rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.content{padding:20px}

/* CARD & KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border-radius:var(--r-lg);padding:16px;border:1px solid var(--border);box-shadow:var(--sh-sm)}
.kpi-num{font-family:var(--mono);font-size:1.8rem;color:var(--text)}
.kpi-label{font-size:.75rem;color:var(--muted)}
.card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--sh-sm);margin-bottom:16px;overflow:hidden}
.card-hd{padding:14px 20px;background:#fafbfa;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}

/* TABLES */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:600px}
th{background:#f8faf8;padding:12px 16px;text-align:left;font-size:.7rem;color:var(--muted);text-transform:uppercase}
td{padding:14px 16px;border-bottom:1px solid #f0f4f0;font-size:.85rem}

/* SIDEBAR NAV */
.sb-top{padding:20px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand{display:flex;align-items:center;gap:10px}
.sb-nav{padding:12px;flex:1;overflow-y:auto}
.sb-section{font-size:.65rem;color:rgba(255,255,255,.3);text-transform:uppercase;margin:15px 10px 5px}
.sb-item{display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:var(--r);color:rgba(255,255,255,.6);cursor:pointer;margin-bottom:2px;transition:all .2s}
.sb-item.on{background:rgba(107,124,92,.3);color:var(--white)}
.sb-logout{padding:12px 15px;color:var(--blush);display:flex;align-items:center;gap:12px}

/* BUTTONS */
.tb-btn{padding:8px 16px;border-radius:var(--r-full);font-size:.8rem}
.tb-btn-p{background:var(--forest);color:white}
.act{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:.75rem;margin-right:4px}

/* TOASTS */
.toasts{position:fixed;bottom:20px;right:20px;left:20px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 20px;background:var(--deep2);color:white;border-radius:var(--r);font-size:.85rem;box-shadow:var(--sh-md);text-align:center}

/* MOBILE RESPONSIVE */
@media(max-width:900px){
  .sb{transform:translateX(-100%)}
  .sb.open{transform:translateX(0)}
  #sb-overlay.open{display:block}
  .main{margin-left:0}
  .menu-toggle{display:flex}
  .topbar{padding:0 15px}
  .kpi-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="loading-screen"><div class="ls-icon">🌿</div><div style="color:white;font-family:var(--mono);font-size:.7rem">SUN GARDEN...</div></div>
<div id="sb-overlay" onclick="toggleSB(false)"></div>

<div id="login-screen">
  <div class="lc">
    <div class="lc-logo"><div class="lc-icon">🌿</div><h1>陽光花園</h1><p>JACKPIPI ADMIN</p></div>
    <div class="lc-badge">管理員登入</div>
    <div class="lf-group"><input class="lf-input" id="a-email" type="email" placeholder="Email" autocomplete="email"/></div>
    <div class="lf-group"><input class="lf-input" id="a-pass" type="password" placeholder="密碼"/></div>
    <button class="btn-login" id="btn-login">進入後台</button>
  </div>
</div>

<div id="admin">
  <aside class="sb" id="main-sb">
    <div class="sb-top">
      <div class="sb-brand"><div class="lc-icon" style="width:32px;height:32px;margin:0;font-size:1rem">🌿</div><div><h2 style="font-size:1rem">陽光花園</h2><p style="font-size:.6rem;opacity:.5">Admin Panel</p></div></div>
    </div>
    <nav class="sb-nav">
      <p class="sb-section">總覽</p>
      <div class="sb-item on" onclick="nav('dashboard')">🏠 儀表板</div>
      <p class="sb-section">訂單</p>
      <div class="sb-item" onclick="nav('orders')">📦 所有訂單</div>
      <p class="sb-section">商品</p>
      <div class="sb-item" onclick="nav('products')">🌿 商品列表</div>
      <div class="sb-item" onclick="nav('add-product')">➕ 新增商品</div>
      <p class="sb-section">會員</p>
      <div class="sb-item" onclick="nav('members')">👥 會員列表</div>
    </nav>
    <div style="padding:20px; border-top:1px solid rgba(255,255,255,.05)">
      <div class="sb-logout" id="btn-logout" style="cursor:pointer">🚪 登出</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-toggle" onclick="toggleSB(true)">☰</button>
      <div class="tb-bc">陽光花園 <span id="tb-title">儀表板</span></div>
    </div>
    
    <div class="content">
      <div class="pg on" id="pg-dashboard">
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-label">總訂單</div><div class="kpi-num" id="kpi-o">0</div></div>
          <div class="kpi"><div class="kpi-label">待處理</div><div class="kpi-num" id="kpi-p" style="color:var(--warn)">0</div></div>
          <div class="kpi"><div class="kpi-label">註冊會員</div><div class="kpi-num" id="kpi-m">0</div></div>
          <div class="kpi"><div class="kpi-label">上架商品</div><div class="kpi-num" id="kpi-pr">0</div></div>
        </div>
        <div class="card">
          <div class="card-hd"><h3>最新訂單</h3></div>
          <div class="tbl-wrap"><table><thead><tr><th>編號</th><th>姓名</th><th>金額</th><th>狀態</th></tr></thead><tbody id="dash-o"></tbody></table></div>
        </div>
      </div>

      <div class="pg" id="pg-products" style="display:none">
        <div style="display:flex;justify-content:space-between;margin-bottom:15px">
            <input placeholder="搜尋商品..." style="padding:10px;border:1px solid var(--border);border-radius:8px;flex:1;margin-right:10px">
            <button class="tb-btn tb-btn-p" onclick="nav('add-product')">+ 新增</button>
        </div>
        <div class="card"><div class="tbl-wrap"><table><thead><tr><th>商品</th><th>售價</th><th>庫存</th><th>操作</th></tr></thead><tbody id="p-body"></tbody></table></div></div>
      </div>

      <div class="pg" id="pg-add-product" style="display:none">
        <div class="card">
          <div class="card-hd"><h3>新增/編輯商品</h3></div>
          <div style="padding:20px">
            <div class="lf-group"><label>商品名稱</label><input class="lf-input" id="pf-name"></div>
            <div class="lf-group"><label>圖示 (Emoji)</label><input class="lf-input" id="pf-emoji" maxlength="2"></div>
            <div class="lf-group"><label>售價</label><input class="lf-input" type="number" id="pf-price"></div>
            <div class="lf-group"><label>庫存</label><input class="lf-input" type="number" id="pf-stock"></div>
            <button class="btn-login" id="btn-save-prod">儲存商品</button>
          </div>
        </div>
      </div>
      
      </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const FB={apiKey:"AIzaSyC103Q-v31-z7nHnnM8KpIZbrrzjrGgGJ4",authDomain:"fir-config-f2e57.firebaseapp.com",projectId:"fir-config-f2e57",storageBucket:"fir-config-f2e57.firebasestorage.app",messagingSenderId:"860181486529",appId:"1:860181486529:web:6f7053a9141694afc66d40"};
const app=initializeApp(FB); const auth=getAuth(app); const db=getFirestore(app);
const ADMINS=["lucky851228@gmail.com"];

window.toggleSB = (open) => {
    document.getElementById('main-sb').classList.toggle('open', open);
    document.getElementById('sb-overlay').classList.toggle('open', open);
};

window.nav = (name) => {
    document.querySelectorAll('.pg').forEach(p => p.style.display='none');
    document.getElementById('pg-'+name).style.display='block';
    document.getElementById('tb-title').textContent = name==='dashboard'?'儀表板':name;
    toggleSB(false); // 手機點擊後自動收起選單
    if(name==='products') loadProducts();
};

onAuthStateChanged(auth, user => {
    document.getElementById('loading-screen').remove();
    if(user && ADMINS.includes(user.email)) {
        document.getElementById('login-screen').style.display='none';
        document.getElementById('admin').classList.add('on');
        loadDash();
    } else {
        document.getElementById('login-screen').style.display='flex';
        document.getElementById('admin').classList.remove('on');
    }
});

// 登入邏輯
document.getElementById('btn-login').onclick = async () => {
    const email = document.getElementById('a-email').value;
    const pass = document.getElementById('a-pass').value;
    try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert('登入失敗'); }
};

document.getElementById('btn-logout').onclick = () => signOut(auth);

async function loadDash() {
    const snap = await getDocs(collection(db, 'orders'));
    document.getElementById('kpi-o').textContent = snap.size;
}

async function loadProducts() {
    const snap = await getDocs(collection(db, 'products'));
    const body = document.getElementById('p-body');
    body.innerHTML = snap.docs.map(d => {
        const p = d.data();
        return `<tr><td>${p.emoji} ${p.name}</td><td>NT$${p.price}</td><td>${p.stock}</td><td><button class="act">✏️</button></td></tr>`;
    }).join('');
}
</script>
</body>
</html>
