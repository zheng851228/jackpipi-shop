<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>管理後台 — 陽光花園 jackpipi</title>
  <link rel="stylesheet" href="global.css" />
  
  <style>
    /* ── 後台基礎佈局 ── */
    :root { --admin-sb-w: 240px; }
    body { background: var(--bg); display: flex; min-height: 100vh; flex-direction: row; margin: 0; }
    
    .sb { width: var(--admin-sb-w); background: var(--deep-forest); color: var(--cream); position: fixed; height: 100vh; padding: 32px 20px; z-index: 100; display: flex; flex-direction: column; }
    .sb h2 { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: 40px; display: flex; align-items: center; gap: 8px; }
    .sb-nav { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .sb-link { padding: 12px 16px; border-radius: var(--r-md); cursor: pointer; transition: var(--t); font-size: 0.9rem; color: rgba(250,247,242,0.6); display: flex; align-items: center; gap: 10px; }
    .sb-link:hover, .sb-link.active { background: rgba(107,124,92,0.25); color: var(--cream); }
    .sb-logout { margin-top: auto; color: var(--blush); opacity: 0.8; padding: 12px 16px; cursor: pointer; font-size: 0.9rem; }

    .main { margin-left: var(--admin-sb-w); padding: 40px; width: 100%; flex: 1; min-width: 0; }
    .card { background: var(--white); border-radius: var(--r-lg); border: 1px solid var(--border); padding: 32px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
    .pg { display: none; } .pg.on { display: block; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

    /* 表格樣式 */
    .table-container { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; margin-top: 15px; }
    th { text-align: left; padding: 14px; background: var(--sand-light); font-size: 0.8rem; font-family: var(--font-mono); color: var(--moss); }
    td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 0.9rem; vertical-align: middle; }

    /* 狀態下拉選單 */
    .status-select { padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); font-size: 0.75rem; background: #fff; cursor: pointer; }
    .status-select.pending { color: var(--terracotta); border-color: var(--terracotta); }
    .status-select.shipped { color: var(--moss); border-color: var(--moss); }
    .status-select.done { color: var(--text-light); }

    /* 訂單明細小字 */
    .order-info { font-size: 0.75rem; color: var(--text-muted); line-height: 1.4; }

    @media (max-width: 1024px) {
      body { flex-direction: column; }
      .sb { position: relative; width: 100%; height: auto; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
      .sb-nav { flex-direction: row; overflow-x: auto; gap: 8px; }
      .sb-link { white-space: nowrap; }
      .main { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>

  <aside class="sb">
    <h2>陽光花園 🌿</h2>
    <nav class="sb-nav">
      <div class="sb-link active" onclick="go('dashboard', this)">🏠 營運總覽</div>
      <div class="sb-link" onclick="go('orders', this)">📦 訂單管理</div>
      <div class="sb-link" onclick="go('products', this)">🪴 商品管理</div>
      <div class="sb-link" onclick="go('add-product', this)">➕ 新增商品</div>
    </nav>
    <div class="sb-logout" id="btn-logout">🚪 登出系統</div>
  </aside>

  <main class="main">
    <div class="pg on" id="pg-dashboard">
      <h2 style="margin-bottom:24px;">營運<em>概況</em></h2>
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
        <div class="card"><h3>總訂單數</h3><h1 id="kpi-orders">0</h1></div>
        <div class="card"><h3>待處理訂單</h3><h1 id="kpi-pending" style="color:var(--terracotta)">0</h1></div>
        <div class="card"><h3>總商品數</h3><h1 id="kpi-prods">0</h1></div>
      </div>
    </div>

    <div class="pg" id="pg-orders">
      <div class="card">
        <h3 style="margin-bottom:20px;">全站訂單記錄</h3>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>編號 / 時間</th>
                <th>收件資訊</th>
                <th>購買品項</th>
                <th>總計</th>
                <th>訂單狀態</th>
              </tr>
            </thead>
            <tbody id="order-body">
              <tr><td colspan="5" style="text-align:center; padding:40px;">讀取訂單中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="pg" id="pg-products">
      <div class="card">
        <h3 style="margin-bottom:20px;">商品管理</h3>
        <div class="table-container">
          <table>
            <thead><tr><th>商品名稱</th><th>售價</th><th>庫存</th><th>狀態</th></tr></thead>
            <tbody id="p-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="pg" id="pg-add-product">
       <div class="card"><h3>新增商品內容... (同前版)</h3></div>
    </div>
  </main>

<script type="module">
import { db, storage, auth } from "./firebase-config.js";
import { collection, onSnapshot, query, orderBy, updateDoc, doc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const $ = id => document.getElementById(id);

// 路由控制
window.go = (n, el) => {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  $(`pg-${n}`).classList.add('on');
  if(el){
    document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
  }
};

// 🟢 訂單管理邏輯
function initOrders() {
  const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
  
  onSnapshot(q, (snapshot) => {
    const orders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    
    // 更新 KPI
    $('kpi-orders').textContent = orders.length;
    $('kpi-pending').textContent = orders.filter(o => o.status === '待處理').length;

    $('order-body').innerHTML = orders.map(o => {
      const date = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString() : '—';
      const items = (o.items || []).map(i => `${i.emoji || '🌿'} ${i.name} x${i.qty}`).join('<br>');
      
      return `
        <tr>
          <td>
            <div style="font-weight:700;">${o.orderId || o.id.slice(0,8)}</div>
            <div style="font-size:0.7rem; color:var(--text-light);">${date}</div>
          </td>
          <td>
            <div class="order-info">
              <strong>${o.customer?.name}</strong> (${o.customer?.phone})<br>
              ${o.customer?.addr}
            </div>
          </td>
          <td style="font-size:0.8rem;">${items}</td>
          <td style="font-family:var(--font-mono); font-weight:700;">NT$ ${o.total?.toLocaleString()}</td>
          <td>
            <select class="status-select ${getStatusColorClass(o.status)}" onchange="window.updateOrderStatus('${o.id}', this.value)">
              <option value="待處理" ${o.status === '待處理' ? 'selected' : ''}>待處理</option>
              <option value="處理中" ${o.status === '處理中' ? 'selected' : ''}>處理中</option>
              <option value="已出貨" ${o.status === '已出貨' ? 'selected' : ''}>已出貨</option>
              <option value="已完成" ${o.status === '已完成' ? 'selected' : ''}>已完成</option>
              <option value="已取消" ${o.status === '已取消' ? 'selected' : ''}>已取消</option>
            </select>
          </td>
        </tr>
      `;
    }).join('');
  });
}

function getStatusColorClass(status) {
  if (status === '待處理') return 'pending';
  if (status === '已出貨') return 'shipped';
  if (status === '已完成') return 'done';
  return '';
}

// 🟢 更新訂單狀態
window.updateOrderStatus = async (docId, newStatus) => {
  try {
    await updateDoc(doc(db, "orders", docId), { status: newStatus });
    alert(`訂單狀態已更新為：${newStatus}`);
  } catch (e) {
    alert("更新失敗：" + e.message);
  }
};

// 商品管理監聽
function initProducts() {
  onSnapshot(collection(db, "products"), s => {
    const prods = s.docs.map(d => ({ id: d.id, ...d.data() }));
    $('kpi-prods').textContent = prods.length;
    $('p-body').innerHTML = prods.map(p => `
      <tr>
        <td>${p.name}</td>
        <td>NT$ ${p.price}</td>
        <td>${p.stock}</td>
        <td>${p.active ? '✅ 上架中' : '❌ 已下架'}</td>
      </tr>
    `).join('');
  });
}

$('btn-logout').onclick = () => signOut(auth).then(() => location.href='member.html');

initOrders();
initProducts();
</script>
</body>
</html>
