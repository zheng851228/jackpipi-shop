<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>管理後台 — 陽光花園 jackpipi</title>
  <link rel="stylesheet" href="global.css" />
  <style>
    :root { --admin-sb-w: 240px; }
    body { background: var(--bg); display: flex; min-height: 100vh; flex-direction: row; margin: 0; }
    .sb { width: var(--admin-sb-w); background: var(--deep-forest); color: var(--cream); position: fixed; height: 100vh; padding: 32px 20px; z-index: 100; display: flex; flex-direction: column; }
    .sb h2 { font-family: var(--font-serif); font-size: 1.2rem; margin-bottom: 40px; display: flex; align-items: center; gap: 8px; }
    .sb-nav { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .sb-link { padding: 12px 16px; border-radius: var(--r-md); cursor: pointer; transition: var(--t); font-size: 0.9rem; color: rgba(250,247,242,0.6); display: flex; align-items: center; gap: 10px; }
    .sb-link:hover, .sb-link.active { background: rgba(107,124,92,0.25); color: var(--cream); }
    .sb-logout { margin-top: auto; color: var(--blush); opacity: 0.8; padding: 12px 16px; cursor: pointer; font-size: 0.9rem; }
    .main { margin-left: var(--admin-sb-w); padding: 40px; width: 100%; flex: 1; min-width: 0; }
    .card { background: var(--white); border-radius: var(--r-lg); border: 1px solid var(--border); padding: 32px; margin-bottom: 24px; box-shadow: var(--shadow-sm); }
    .pg { display: none; } .pg.on { display: block; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
    .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; margin-top: 15px; }
    th { text-align: left; padding: 14px; background: var(--sand-light); font-size: 0.8rem; font-family: var(--font-mono); color: var(--moss); }
    td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 0.85rem; vertical-align: middle; }
    .status-select { padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); font-size: 0.75rem; background: #fff; cursor: pointer; }
    .status-select.pending { color: var(--terracotta); border-color: var(--terracotta); }
    .status-select.shipped { color: var(--moss); border-color: var(--moss); }
    .fi { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: var(--r-md); margin-top: 6px; margin-bottom: 18px; outline: none; transition: var(--t); background: var(--white); box-sizing: border-box; }
    .img-prev { width: 120px; height: 120px; object-fit: cover; border-radius: var(--r-md); background: var(--sand-light); margin-bottom: 12px; display: none; border: 1px solid var(--border); }
    @media (max-width: 1024px) {
      body { flex-direction: column; }
      .sb { position: relative; width: 100%; height: auto; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
      .sb-nav { flex-direction: row; overflow-x: auto; gap: 8px; }
      .sb-link { white-space: nowrap; }
      .main { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>
  <aside class="sb">
    <h2>陽光花園 🌿</h2>
    <nav class="sb-nav">
      <div class="sb-link active" onclick="go('dashboard', this)">🏠 營運總覽</div>
      <div class="sb-link" onclick="go('orders', this)">📦 訂單管理</div>
      <div class="sb-link" onclick="go('products', this)">🪴 商品管理</div>
      <div class="sb-link" onclick="go('add-product', this)">➕ 新增商品</div>
    </nav>
    <div class="sb-logout" id="btn-logout">🚪 登出系統</div>
  </aside>

  <main class="main">
    <div class="pg on" id="pg-dashboard">
      <h2 style="margin-bottom:24px;">營運<em>概況</em></h2>
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
        <div class="card"><h3>總訂單數</h3><h1 id="kpi-orders">0</h1></div>
        <div class="card"><h3>待處理</h3><h1 id="kpi-pending" style="color:var(--terracotta)">0</h1></div>
        <div class="card"><h3>總商品數</h3><h1 id="kpi-prods">0</h1></div>
      </div>
    </div>

    <div class="pg" id="pg-orders">
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h3 style="margin:0;">全站訂單記錄</h3>
          <button class="btn btn--outline" id="btn-export-csv" style="font-size:0.8rem; padding:8px 16px;">📥 導出報表 (CSV)</button>
        </div>
        <div class="table-container">
          <table>
            <thead><tr><th>訂單 / 時間</th><th>收件資訊</th><th>購買品項</th><th>總計</th><th>狀態</th></tr></thead>
            <tbody id="order-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="pg" id="pg-products">
      <div class="card">
        <h3>商品管理</h3>
        <div class="table-container">
          <table>
            <thead><tr><th>商品圖片</th><th>名稱</th><th>售價</th><th>庫存</th><th>狀態</th></tr></thead>
            <tbody id="p-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="pg" id="pg-add-product">
      <div class="card" style="max-width:800px;">
        <h3>新增植栽選品</h3>
        <div style="margin-bottom: 24px; padding: 20px; background: var(--sand-light); border-radius: var(--r-md); text-align:center;">
          <img class="img-prev" id="img-prev" style="margin: 0 auto 15px;">
          <input type="file" id="pf-file" accept="image/*" class="fi" style="border:none; padding:0;">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
          <div><label>名稱 *</label><input class="fi" id="pf-name"></div>
          <div><label>分類</label><select class="fi" id="pf-category"><option value="beginner">🌱 新手入門</option><option value="collector">🪴 資深玩家</option></select></div>
          <div><label>售價 *</label><input class="fi" type="number" id="pf-price"></div>
          <div><label>庫存 *</label><input class="fi" type="number" id="pf-stock" value="10"></div>
        </div>
        <button class="btn btn--primary btn--full" id="btn-save">儲存並發布商品</button>
      </div>
    </div>
  </main>

<script type="module">
import { db, storage, auth } from "./firebase-config.js";
import { collection, onSnapshot, query, orderBy, updateDoc, doc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const $ = id => document.getElementById(id);
let currentOrders = [];
let imgFile = null;

// 🟢 圖片壓縮函數
async function compressImage(file, { maxWidth = 1000, quality = 0.7 } = {}) {
  return new Promise((resolve) => {
    const reader = new FileReader(); reader.readAsDataURL(file);
    reader.onload = (e) => {
      const img = new Image(); img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width; let height = img.height;
        if (width > maxWidth) { height = (maxWidth / width) * height; width = maxWidth; }
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
      };
    };
  });
}

// 🟢 CSV 導出邏輯
function exportToCSV(orders) {
  const headers = ["訂單編號", "日期", "客戶", "電話", "地址", "品項", "總計", "狀態"];
  const rows = orders.map(o => [
    o.orderId || o.id,
    o.createdAt?.toDate ? o.createdAt.toDate().toLocaleDateString() : '',
    o.customer?.name, o.customer?.phone, `"${o.customer?.addr}"`,
    `"${(o.items||[]).map(i=>i.name).join(';')}"`, o.total, o.status
  ]);
  const csvContent = "\uFEFF" + [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `陽光花園訂單_${new Date().toLocaleDateString()}.csv`;
  link.click();
}

window.go = (n, el) => {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  $(`pg-${n}`).classList.add('on');
  if(el){ document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active')); el.classList.add('active'); }
};

// 訂單狀態更新
window.updateOrderStatus = async (id, s) => { await updateDoc(doc(db, "orders", id), { status: s }); alert("狀態已更新"); };

// 初始化監聽
function init() {
  onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), s => {
    currentOrders = s.docs.map(d => ({ id: d.id, ...d.data() }));
    $('kpi-orders').textContent = currentOrders.length;
    $('kpi-pending').textContent = currentOrders.filter(o => o.status === '待處理').length;
    $('order-body').innerHTML = currentOrders.map(o => `
      <tr>
        <td><strong>${o.orderId || o.id.slice(0,8)}</strong><br><small>${o.createdAt?.toDate().toLocaleString()}</small></td>
        <td>${o.customer?.name}<br>${o.customer?.phone}</td>
        <td>${(o.items||[]).map(i => `${i.name}x${i.qty}`).join('<br>')}</td>
        <td>NT$ ${o.total?.toLocaleString()}</td>
        <td>
          <select class="status-select" onchange="updateOrderStatus('${o.id}', this.value)">
            <option ${o.status==='待處理'?'selected':''}>待處理</option>
            <option ${o.status==='已出貨'?'selected':''}>已出貨</option>
            <option ${o.status==='已完成'?'selected':''}>已完成</option>
          </select>
        </td>
      </tr>`).join('');
  });

  onSnapshot(collection(db, "products"), s => {
    const ps = s.docs.map(d => ({ id: d.id, ...d.data() }));
    $('kpi-prods').textContent = ps.length;
    $('p-body').innerHTML = ps.map(p => `
      <tr>
        <td><img src="${p.imageUrl}" style="width:40px;height:40px;object-fit:cover;border-radius:4px"></td>
        <td>${p.name}</td><td>NT$ ${p.price}</td><td>${p.stock}</td><td>${p.active?'✅':'❌'}</td>
      </tr>`).join('');
  });
}

$('pf-file').onchange = e => { imgFile = e.target.files[0]; const r = new FileReader(); r.onload = x => { $('img-prev').src = x.target.result; $('img-prev').style.display = 'block'; }; r.readAsDataURL(imgFile); };
$('btn-export-csv').onclick = () => exportToCSV(currentOrders);
$('btn-logout').onclick = () => signOut(auth).then(() => location.href='member.html');

$('btn-save').onclick = async () => {
  const btn = $('btn-save'); btn.disabled = true; btn.textContent = '處理中...';
  try {
    let url = '';
    if(imgFile) {
      const blob = await compressImage(imgFile);
      const sRef = ref(storage, `products/${Date.now()}.jpg`);
      await uploadBytesResumable(sRef, blob); url = await getDownloadURL(sRef);
    }
    await addDoc(collection(db, "products"), { name: $('pf-name').value, category: $('pf-category').value, price: Number($('pf-price').value), stock: Number($('pf-stock').value), imageUrl: url, active: true, updatedAt: serverTimestamp() });
    alert("上架成功！"); location.reload();
  } catch (e) { alert(e.message); btn.disabled = false; }
};

init();
</script>
</body>
</html>
