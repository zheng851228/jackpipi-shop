<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>後台管理 — 陽光花園 jackpipi</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --moss:#6B7C5C;--forest:#3D5040;--deep:#1e2e22;--deep2:#253228;
  --sand:#E8DDD0;--sand-light:#F5F0EA;--blush:#D4A8A0;--terra:#B5704F;
  --cream:#FAF7F2;--bg:#f2f4f0;--white:#fff;--text:#1e2a1f;
  --muted:#6b7a6c;--light:#a8b5a8;--border:#e0e8df;
  --sh-sm:0 1px 4px rgba(30,46,34,.06),0 4px 16px rgba(30,46,34,.06);
  --sh-md:0 4px 12px rgba(30,46,34,.08),0 12px 32px rgba(30,46,34,.08);
  --r:10px;--r-lg:14px;--r-full:999px;
  --serif:'Noto Serif TC',serif;--mono:'DM Mono',monospace;
  --ease:.22s cubic-bezier(.4,0,.2,1);
  --sidebar:240px;--topbar:60px;
  --ok:#4d9155;--err:#b84c41;--warn:#c49a2a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:inherit}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--deep);display:flex;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:14px;transition:opacity .3s}
.ls-icon{font-size:2.4rem;animation:lsPulse 1.5s infinite}
.ls-txt{font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;color:rgba(250,247,242,.35);text-transform:uppercase}
@keyframes lsPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.9)}}

/* LOGIN */
#login-screen{display:none;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--deep) 0%,#2d4a32 100%)}
.lc{background:var(--white);border-radius:20px;padding:44px 40px;width:90%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.25)}
.lc-top{text-align:center;margin-bottom:32px}
.lc-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--forest),var(--moss));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 12px}
.lc-top h2{font-size:1.15rem;font-weight:700;color:var(--forest);margin-bottom:3px}
.lc-top p{font-size:.72rem;font-family:var(--mono);color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.lc-msg{padding:10px 14px;border-radius:var(--r);font-size:.8rem;margin-bottom:12px;display:none;line-height:1.5}
.lc-msg.show{display:block}.lc-msg.fail{background:#fff0ef;color:var(--err);border:1px solid #fdd8d5}
.fg{margin-bottom:14px}
.fl{display:block;font-size:.72rem;font-family:var(--mono);letter-spacing:.08em;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-size:.9rem;color:var(--text);background:#fafbfa;outline:none;transition:all var(--ease)}
.fi:focus{border-color:var(--moss);box-shadow:0 0 0 3px rgba(107,124,92,.1);background:var(--white)}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--forest),var(--moss));color:var(--cream);border-radius:var(--r-full);font-size:.92rem;font-family:var(--serif);letter-spacing:.04em;transition:all var(--ease);cursor:pointer;border:none;box-shadow:0 4px 16px rgba(61,80,64,.25);display:flex;align-items:center;justify-content:center;gap:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ADMIN SHELL */
#admin{display:none}
#admin.on{display:block}
#sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:none;backdrop-filter:blur(2px)}
#sb-overlay.open{display:block}

/* SIDEBAR */
.sb{width:var(--sidebar);background:var(--deep);color:var(--cream);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s ease}
.sb-brand{padding:22px 20px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-brand-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sb-brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--moss),#8aaa7a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.sb-brand-text h2{font-size:.88rem;font-weight:700;color:var(--cream)}
.sb-brand-text p{font-size:.6rem;font-family:var(--mono);color:rgba(250,247,242,.35);letter-spacing:.06em}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.05);border-radius:var(--r)}
.sb-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--terra),var(--blush));display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;flex-shrink:0}
.sb-uname{font-size:.74rem;color:var(--cream);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-nav{flex:1;padding:10px;overflow-y:auto}
.sb-sec{font-size:.6rem;font-family:var(--mono);letter-spacing:.12em;color:rgba(250,247,242,.28);text-transform:uppercase;padding:10px 8px 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;font-size:.84rem;color:rgba(250,247,242,.55);cursor:pointer;transition:all var(--ease);margin-bottom:1px;position:relative}
.sb-item:hover{background:rgba(255,255,255,.07);color:rgba(250,247,242,.85)}
.sb-item.on{background:rgba(107,124,92,.28);color:var(--cream)}
.sb-item.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--moss);border-radius:0 2px 2px 0}
.sb-badge{margin-left:auto;background:var(--terra);color:#fff;padding:1px 7px;border-radius:var(--r-full);font-size:.6rem;font-family:var(--mono)}
.sb-logout{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:.8rem;color:rgba(212,168,160,.55);cursor:pointer;transition:all var(--ease)}
.sb-logout:hover{background:rgba(212,168,160,.1);color:var(--blush)}
.sb-ver{padding:8px;font-size:.58rem;font-family:var(--mono);color:rgba(250,247,242,.18);text-align:center}

/* MAIN */
.main{margin-left:var(--sidebar);min-height:100vh;display:flex;flex-direction:column;transition:margin .3s ease}
.topbar{height:var(--topbar);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:50;gap:12px}
.menu-btn{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:8px;border:1.5px solid var(--border);color:var(--muted);flex-shrink:0}
.tb-bc{font-size:.82rem;color:var(--muted);font-family:var(--mono)}
.tb-bc b{color:var(--text);font-weight:600}
.content{flex:1;padding:20px}
.pg{display:none}.pg.on{display:block;animation:pgIn .2s ease}

/* CARDS & KPI */
.card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--sh-sm);overflow:hidden;margin-bottom:16px}
.card-hd{padding:14px 20px;background:#fafbfa;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-hd h3{font-size:.88rem;font-weight:600;color:var(--forest)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border-radius:var(--r-lg);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--sh-sm);transition:transform var(--ease)}
.kpi:hover{transform:translateY(-2px)}
.kpi-num{font-family:var(--mono);font-size:1.8rem;color:var(--forest);line-height:1;margin-bottom:4px}
.kpi-label{font-size:.7rem;font-family:var(--mono);color:var(--muted)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;border-radius:var(--r-full);font-size:.8rem;cursor:pointer;border:none;transition:all var(--ease)}
.btn-p{background:var(--forest);color:var(--cream);box-shadow:0 2px 8px rgba(61,80,64,.2)}
.btn-p:disabled{opacity:.6;cursor:not-allowed}
.btn-o{border:1.5px solid var(--border);color:var(--forest);background:var(--white)}
.btn-r{background:var(--err);color:#fff}

/* IMAGE UPLOAD UI */
.img-upload-zone{border:2px dashed var(--border);border-radius:var(--r-lg);padding:20px;text-align:center;cursor:pointer;background:#fafbfa;position:relative}
.img-upload-zone.drag{border-color:var(--moss);background:rgba(107,124,92,.04)}
.img-preview{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:var(--r);display:none;max-height:220px}
.img-preview.show{display:block}
.img-placeholder{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 0;color:var(--light)}
.img-upload-progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;display:none}
.img-upload-progress.show{display:block}
.img-upload-progress-bar{height:100%;background:var(--moss);width:0%;transition:width .3s}
.img-tab-row{display:flex;margin-bottom:12px;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.img-tab{flex:1;padding:9px;text-align:center;font-size:.78rem;cursor:pointer;background:var(--white);color:var(--muted)}
.img-tab.on{background:var(--forest);color:var(--cream)}
.img-url-preview{width:80px;height:80px;border-radius:var(--r);object-fit:cover;border:1px solid var(--border);display:none}
.img-url-preview.show{display:block}

/* RESPONSIVE */
@media(max-width:900px){
  .sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}
  #sb-overlay.open{display:block}.main{margin-left:0}.menu-btn{display:flex}
}
@media(max-width:600px){.content{padding:14px}.frow{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loading-screen"><div class="ls-icon">🌿</div><div class="ls-txt">Loading...</div></div>

<div id="login-screen">
  <div class="lc">
    <div class="lc-top"><div class="lc-icon">🌿</div><h2>陽光花園 jackpipi</h2><p>Admin Dashboard</p></div>
    <div class="lc-msg" id="lc-msg"></div>
    <div class="fg"><label class="fl">Email</label><input class="fi" id="a-email" type="email" placeholder="admin@example.com"></div>
    <div class="fg"><label class="fl">密碼</label><input class="fi" id="a-pass" type="password" placeholder="••••••••"></div>
    <button class="btn-login" id="btn-login"><span id="login-txt">登入後台</span><div id="login-spin" style="width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none"></div></button>
  </div>
</div>

<div id="admin">
  <div id="sb-overlay" onclick="toggleSB(false)"></div>
  <aside class="sb" id="main-sb">
    <div class="sb-brand">
      <div class="sb-brand-row"><div class="sb-brand-icon">🌿</div><div class="sb-brand-text"><h2>陽光花園</h2><p>jackpipi · ADMIN</p></div></div>
      <div class="sb-user"><div class="sb-av" id="sb-av">A</div><div class="sb-uname" id="sb-name">管理員</div></div>
    </div>
    <nav class="sb-nav">
      <p class="sb-sec">總覽</p>
      <div class="sb-item on" data-pg="dashboard" onclick="go('dashboard')">🏠 儀表板</div>
      <p class="sb-sec">訂單</p>
      <div class="sb-item" data-pg="orders" onclick="go('orders')">📦 所有訂單 <span class="sb-badge" id="sb-badge">0</span></div>
      <p class="sb-sec">商品</p>
      <div class="sb-item" data-pg="products" onclick="go('products')">🌿 商品列表</div>
      <div class="sb-item" data-pg="add-product" onclick="go('add-product')">➕ 新增商品</div>
      <p class="sb-sec">會員</p>
      <div class="sb-item" data-pg="members" onclick="go('members')">👥 會員列表</div>
    </nav>
    <div class="sb-bottom">
      <div class="sb-logout" id="btn-logout">🚪 登出</div>
      <div class="sb-ver">Firestore · v2.1</div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSB(true)">☰</button>
      <div class="tb-bc">陽光花園 › <b id="tb-title">儀表板</b></div>
    </div>
    <div class="content">

      <div class="pg on" id="pg-dashboard">
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-num" id="kpi-o">0</div><div class="kpi-label">總訂單</div></div>
          <div class="kpi"><div class="kpi-num" id="kpi-p" style="color:var(--warn)">0</div><div class="kpi-label">待處理</div></div>
          <div class="kpi"><div class="kpi-num" id="kpi-pr">0</div><div class="kpi-label">上架商品</div></div>
        </div>
        <div class="card">
          <div class="card-hd"><h3>最新訂單</h3></div>
          <div class="tbl-wrap"><table><thead><tr><th>編號</th><th>姓名</th><th>金額</th><th>狀態</th></tr></thead><tbody id="dash-o"></tbody></table></div>
        </div>
      </div>

      <div class="pg" id="pg-products">
        <div class="fbar">
          <input class="fsearch" id="p-q" placeholder="搜尋商品...">
          <button class="btn btn-p" style="margin-left:auto" onclick="go('add-product')">＋ 新增商品</button>
        </div>
        <div class="card">
          <div class="tbl-wrap"><table><thead><tr><th>商品</th><th>售價</th><th>庫存</th><th>狀態</th><th>操作</th></tr></thead><tbody id="p-body"></tbody></table></div>
        </div>
      </div>

      <div class="pg" id="pg-add-product">
        <div class="card" style="max-width:640px;margin:0 auto">
          <div class="card-hd"><h3 id="form-title">商品編輯</h3></div>
          <div style="padding:24px">
            <div class="img-tab-row">
              <div class="img-tab on" id="tab-upload" onclick="switchImgTab('upload')">📁 上傳</div>
              <div class="img-tab" id="tab-url" onclick="switchImgTab('url')">🔗 網址</div>
              <div class="img-tab" id="tab-emoji" onclick="switchImgTab('emoji')">😊 Emoji</div>
            </div>

            <div id="img-panel-upload">
              <div class="img-upload-zone" id="img-drop-zone">
                <input type="file" id="pf-img-file" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer" onchange="handleImgFile(this)">
                <img class="img-preview" id="img-preview" src="">
                <div class="img-placeholder" id="img-placeholder">點擊或拖曳圖片至此</div>
                <div class="img-upload-progress" id="img-progress"><div class="img-upload-progress-bar" id="img-progress-bar"></div></div>
              </div>
            </div>

            <div id="img-panel-url" style="display:none">
              <input class="fi" id="pf-img-url" placeholder="貼上圖片網址" oninput="previewUrl(this.value)">
              <img class="img-url-preview" id="img-url-preview" style="margin-top:10px">
            </div>

            <div id="img-panel-emoji" style="display:none">
              <input class="fi" id="pf-emoji" placeholder="例如：🌵" maxlength="2">
            </div>

            <div class="fg" style="margin-top:20px"><label class="fl">商品名稱 *</label><input class="fi" id="pf-name"></div>
            <div class="frow" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div class="fg"><label class="fl">售價 *</label><input class="fi" type="number" id="pf-price"></div>
              <div class="fg"><label class="fl">庫存</label><input class="fi" type="number" id="pf-stock"></div>
            </div>
            <div class="fg"><label class="fl">商品分類</label>
              <select class="fi" id="pf-cat">
                <option value="beginner">🌱 新手入門</option>
                <option value="collector">🪴 資深玩家</option>
                <option value="media-tools">🪣 介質工具</option>
              </select>
            </div>
            <div class="fg"><label class="fl">上架狀態</label><input type="checkbox" id="pf-active" checked> 上架中</div>

            <button class="btn btn-p" style="width:100%;padding:14px;margin-top:20px" id="btn-save-prod">儲存商品</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, getDoc, doc, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const FB={apiKey:"AIzaSyC103Q-v31-z7nHnnM8KpIZbrrzjrGgGJ4",authDomain:"fir-config-f2e57.firebaseapp.com",projectId:"fir-config-f2e57",storageBucket:"fir-config-f2e57.firebasestorage.app",messagingSenderId:"860181486529",appId:"1:860181486529:web:6f7053a9141694afc66d40"};
const ADMINS=["lucky851228@gmail.com"];
const app=initializeApp(FB); const auth=getAuth(app); const db=getFirestore(app); const storage=getStorage(app);

const $=id=>document.getElementById(id);
let curPage='dashboard';
let imgFile=null; let imgTab='upload'; let editId=null;

window.toggleSB=s=>{$('main-sb').classList.toggle('open',s);$('sb-overlay').classList.toggle('open',s)};
window.go=n=>{
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('on'));
  $(`pg-${n}`).classList.add('on');
  document.querySelector(`[data-pg="${n}"]`)?.classList.add('on');
  $('tb-title').textContent=n; toggleSB(false);
  if(n==='dashboard')loadDash(); if(n==='products')loadProducts(); if(n==='add-product')resetForm();
};

onAuthStateChanged(auth,u=>{
  $('loading-screen').style.opacity='0'; setTimeout(()=>$('loading-screen').style.display='none',300);
  if(u && ADMINS.includes(u.email)){
    $('login-screen').style.display='none'; $('admin').classList.add('on'); loadDash();
  } else {
    $('login-screen').style.display='flex'; $('admin').classList.remove('on');
  }
});

$('btn-login').onclick=async()=>{
  const e=$('a-email').value, p=$('a-pass').value;
  try{ await signInWithEmailAndPassword(auth,e,p); }catch(err){ alert('登入失敗'); }
};
$('btn-logout').onclick=()=>signOut(auth);

// 圖片處理
window.switchImgTab=t=>{
  imgTab=t; ['upload','url','emoji'].forEach(x=>{$(`img-panel-${x}`).style.display=(x===t?'block':'none');$(`tab-${x}`).classList.toggle('on',x===t)});
};
window.handleImgFile=i=>{
  imgFile=i.files[0]; if(!imgFile) return;
  const r=new FileReader(); r.onload=e=>{ $('img-preview').src=e.target.result; $('img-preview').classList.add('show'); $('img-placeholder').style.display='none'; }; r.readAsDataURL(imgFile);
};
window.previewUrl=u=>{ $('img-url-preview').src=u; $('img-url-preview').classList.toggle('show',!!u); };

// 儲存商品
$('btn-save-prod').onclick=async()=>{
  const n=$('pf-name').value; const p=parseFloat($('pf-price').value);
  if(!n||!p) return alert('請填寫必填欄位');
  $('btn-save-prod').disabled=true; $('btn-save-prod').textContent='儲存中...';

  try {
    let finalUrl = ''; let finalType = imgTab;
    if(imgTab==='upload' && imgFile){
      const path=`products/${Date.now()}_${imgFile.name}`;
      const sRef=ref(storage, path);
      const task=uploadBytesResumable(sRef, imgFile);
      finalUrl = await new Promise((res,rej)=>{
        task.on('state_changed',null,rej,async()=>res(await getDownloadURL(task.snapshot.ref)));
      });
    } else if(imgTab==='url'){ finalUrl=$('pf-img-url').value; }

    const data={
      name:n, price:p, stock:parseInt($('pf-stock').value)||0, emoji:$('pf-emoji').value||'🌿',
      imageUrl:finalUrl, imageType:finalType, category:$('pf-cat').value,
      active:$('pf-active').checked, updatedAt:serverTimestamp()
    };

    if(editId) await updateDoc(doc(db,'products',editId), data);
    else { data.createdAt=serverTimestamp(); await addDoc(collection(db,'products'), data); }
    
    alert('儲存成功'); go('products');
  } catch(e){ alert('失敗：'+e.message); }
  finally{ $('btn-save-prod').disabled=false; $('btn-save-prod').textContent='儲存商品'; }
};

async function loadDash(){
  const [o,p]=await Promise.all([getDocs(collection(db,'orders')),getDocs(collection(db,'products'))]);
  $('kpi-o').textContent=o.size; $('kpi-pr').textContent=p.size;
}

async function loadProducts(){
  const s=await getDocs(collection(db,'products'));
  $('p-body').innerHTML=s.docs.map(d=>{
    const x=d.data();
    const imgHtml = x.imageUrl ? `<img src="${x.imageUrl}" style="width:32px;height:32px;object-fit:cover;border-radius:4px">` : `<span>${x.emoji}</span>`;
    return `<tr><td>${imgHtml} ${x.name}</td><td>NT$${x.price}</td><td>${x.stock}</td><td>${x.active?'✅':'❌'}</td><td><button onclick="editProd('${d.id}')">✏️</button></td></tr>`;
  }).join('');
}

window.editProd=async id=>{
  const s=await getDoc(doc(db,'products',id)); if(!s.exists()) return;
  const x=s.data(); editId=id; go('add-product');
  $('pf-name').value=x.name; $('pf-price').value=x.price; $('pf-stock').value=x.stock;
  $('pf-emoji').value=x.emoji; $('pf-active').checked=x.active;
  if(x.imageType==='url'){ switchImgTab('url'); $('pf-img-url').value=x.imageUrl; previewUrl(x.imageUrl); }
  else if(x.imageUrl){ switchImgTab('upload'); $('img-preview').src=x.imageUrl; $('img-preview').classList.add('show'); $('img-placeholder').style.display='none'; }
};

function resetForm(){ editId=null; $('pf-name').value=''; $('pf-price').value=''; $('pf-stock').value=''; $('img-preview').src=''; $('img-preview').classList.remove('show'); $('img-placeholder').style.display='block'; }
</script>
</body>
</html>
