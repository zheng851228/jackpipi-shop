<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>後台管理 — 陽光花園 jackpipi</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --moss:#6B7C5C;--forest:#3D5040;--deep:#1e2e22;--deep2:#253228;
  --sand:#E8DDD0;--sand-light:#F5F0EA;--blush:#D4A8A0;--terra:#B5704F;
  --cream:#FAF7F2;--bg:#f2f4f0;--white:#fff;--text:#1e2a1f;
  --muted:#6b7a6c;--light:#a8b5a8;--border:#e0e8df;
  --sh-sm:0 1px 4px rgba(30,46,34,.06),0 4px 16px rgba(30,46,34,.06);
  --sh-md:0 4px 12px rgba(30,46,34,.08),0 12px 32px rgba(30,46,34,.08);
  --r:10px;--r-lg:14px;--r-full:999px;
  --serif:'Noto Serif TC',serif;--mono:'DM Mono',monospace;
  --ease:.22s cubic-bezier(.4,0,.2,1);
  --sidebar:240px;--topbar:60px;
  --ok:#4d9155;--err:#b84c41;--warn:#c49a2a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--serif);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--deep);display:flex;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:14px;transition:opacity .3s}
.ls-icon{font-size:2.4rem;animation:lsPulse 1.5s infinite}
@keyframes lsPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.9)}}

/* LOGIN */
#login-screen{display:none;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--deep) 0%,#2d4a32 100%)}
.lc{background:var(--white);border-radius:20px;padding:44px 40px;width:90%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.25)}
.lc-top{text-align:center;margin-bottom:32px}
.lc-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--forest),var(--moss));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin:0 auto 12px}

/* SIDEBAR & NAV */
#sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:none;backdrop-filter:blur(2px)}
#sb-overlay.open{display:block}
.sb{width:var(--sidebar);background:var(--deep);color:var(--cream);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s ease}
.sb-brand{padding:22px 20px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.05);border-radius:var(--r);margin-top:12px}
.sb-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--terra),var(--blush));display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700}
.sb-nav{flex:1;padding:10px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:9px;padding:10px;border-radius:8px;font-size:.88rem;color:rgba(250,247,242,.55);cursor:pointer;margin-bottom:2px}
.sb-item.on{background:rgba(107,124,92,.28);color:var(--cream);position:relative}
.sb-item.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--moss);border-radius:0 2px 2px 0}

/* MAIN */
.main{margin-left:var(--sidebar);min-height:100vh;display:flex;flex-direction:column;transition:margin .3s ease}
.topbar{height:var(--topbar);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:50;gap:12px}
.menu-btn{display:none;width:36px;height:36px;align-items:center;justify-content:center;border-radius:8px;border:1.5px solid var(--border);color:var(--muted);font-size:1.1rem}
.tb-bc{font-size:.85rem;color:var(--muted);font-family:var(--mono)}
.content{flex:1;padding:20px}
.pg{display:none}.pg.on{display:block;animation:pgIn .2s ease}

/* COMPONENTS */
.card{background:var(--white);border-radius:var(--r-lg);border:1px solid var(--border);box-shadow:var(--sh-sm);margin-bottom:16px;overflow:hidden}
.card-hd{padding:14px 20px;background:#fafbfa;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--white);border-radius:var(--r-lg);padding:18px 20px;border:1px solid var(--border)}
.kpi-num{font-family:var(--mono);font-size:1.8rem;color:var(--forest);font-weight:700}
.tag{display:inline-flex;padding:3px 8px;border-radius:var(--r-full);font-size:.7rem;font-family:var(--mono)}
.t-on{background:#e8f5e8;color:#3d7a40}.t-off{background:#f5f5f5;color:#888}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 18px;border-radius:var(--r-full);font-size:.8rem;cursor:pointer;border:none}
.btn-p{background:var(--forest);color:var(--cream)}
.btn-o{border:1.5px solid var(--border);color:var(--forest);background:var(--white)}

/* IMAGE UPLOAD UI */
.img-tab-row{display:flex;margin-bottom:12px;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.img-tab{flex:1;padding:9px;text-align:center;font-size:.78rem;cursor:pointer;background:var(--white);color:var(--muted);border:none}
.img-tab.on{background:var(--forest);color:var(--cream)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--r-lg);padding:24px;text-align:center;cursor:pointer;background:#fafbfa;position:relative}
.img-prev-main{width:100%;max-height:220px;object-fit:cover;border-radius:var(--r);display:none}
.img-prev-active{display:block}
.img-prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;display:none}
.img-prog.show{display:block}
.img-prog-bar{height:100%;background:var(--moss);width:0%}

@media(max-width:900px){
  .sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}
  #sb-overlay.open{display:block}.main{margin-left:0}.menu-btn{display:flex}
}
</style>
</head>
<body>

<div id="loading-screen"><div class="ls-icon">🌿</div></div>

<div id="login-screen">
  <div class="lc">
    <div class="lc-top"><div class="lc-icon">🌿</div><h2>陽光花園後台</h2><p>JACKPIPI ADMIN</p></div>
    <div class="lc-msg" id="lc-msg"></div>
    <div style="margin-bottom:15px"><input class="li" id="a-email" type="email" placeholder="Email" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px"></div>
    <div style="margin-bottom:20px"><input class="li" id="a-pass" type="password" placeholder="密碼" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px"></div>
    <button class="btn-login" id="btn-login" style="width:100%">登入系統</button>
  </div>
</div>

<div id="admin">
  <div id="sb-overlay" onclick="toggleSB(false)"></div>
  <aside class="sb" id="main-sb">
    <div class="sb-brand">
      <div class="sb-brand-row"><h2>陽光花園 🌿</h2></div>
      <div class="sb-user"><div class="sb-av" id="sb-av">A</div><div id="sb-name" style="font-size:.75rem;margin-left:8px">管理員</div></div>
    </div>
    <nav class="sb-nav">
      <div class="sb-item on" data-pg="dashboard" onclick="go('dashboard')">🏠 儀表板</div>
      <div class="sb-item" data-pg="products" onclick="go('products')">🌿 商品列表</div>
      <div class="sb-item" data-pg="add-product" onclick="go('add-product')">➕ 新增商品</div>
      <div class="sb-item" data-pg="orders" onclick="go('orders')">📦 訂單管理</div>
      <div class="sb-item" data-pg="members" onclick="go('members')">👥 會員列表</div>
    </nav>
    <div style="padding:20px"><button onclick="handleLogout()" style="color:var(--blush)">🚪 登出系統</button></div>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSB(true)">☰</button>
      <div class="tb-bc">Admin › <b id="tb-title">儀表板</b></div>
    </div>
    <div class="content">

      <div class="pg on" id="pg-dashboard">
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-num" id="kpi-o">0</div><div class="kpi-label">總訂單數</div></div>
          <div class="kpi"><div class="kpi-num" id="kpi-pr">0</div><div class="kpi-label">已上架商品</div></div>
        </div>
        <div class="card">
          <div class="card-hd"><h3>最近動態</h3></div>
          <div style="padding:20px;color:var(--muted)">歡迎回來，管理員。</div>
        </div>
      </div>

      <div class="pg" id="pg-products">
        <div class="card">
          <div class="card-hd"><h3>商品列表</h3><button class="btn btn-p" onclick="go('add-product')">+ 新增商品</button></div>
          <div class="tbl-wrap">
            <table style="width:100%; border-collapse:collapse">
              <thead><tr style="border-bottom:1px solid var(--border)"><th style="padding:15px;text-align:left">商品</th><th style="padding:15px;text-align:left">售價</th><th style="padding:15px;text-align:left">庫存</th><th style="padding:15px;text-align:left">狀態</th><th style="padding:15px;text-align:left">操作</th></tr></thead>
              <tbody id="p-body"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="pg" id="pg-add-product">
        <div class="card" style="max-width:600px;margin:0 auto">
          <div class="card-hd"><h3>編輯商品</h3></div>
          <div style="padding:24px">
            <div class="img-tab-row">
              <button class="img-tab on" id="tab-upload" onclick="switchTab('upload')">📁 上傳</button>
              <button class="img-tab" id="tab-url" onclick="switchTab('url')">🔗 網址</button>
              <button class="img-tab" id="tab-emoji" onclick="switchTab('emoji')">😊 Emoji</button>
            </div>
            
            <div id="panel-upload">
              <div class="drop-zone" onclick="document.getElementById('pf-file').click()">
                <input type="file" id="pf-file" accept="image/*" style="display:none" onchange="onFileChange(this)">
                <img class="img-prev-main" id="img-prev" src="">
                <div id="img-ph">點擊選擇圖片 (5MB內)</div>
              </div>
              <div class="img-prog" id="img-prog"><div class="img-prog-bar" id="img-prog-bar"></div></div>
            </div>

            <div id="panel-url" style="display:none"><input class="fi" id="pf-url" placeholder="https://..." oninput="onUrlInput(this.value)"></div>
            <div id="panel-emoji" style="display:none"><input class="fi" id="pf-emoji" placeholder="Emoji (如: 🌵)" maxlength="2"></div>

            <div style="margin-top:20px"><label class="fl">商品名稱 *</label><input class="fi" id="pf-name"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:15px">
              <div><label class="fl">售價 *</label><input class="fi" type="number" id="pf-price"></div>
              <div><label class="fl">庫存</label><input class="fi" type="number" id="pf-stock"></div>
            </div>
            
            <div style="margin-top:15px"><label><input type="checkbox" id="pf-active" checked> 上架中</label></div>
            <button class="btn btn-p" id="btn-save" style="width:100%;padding:15px;margin-top:20px;font-size:1rem">儲存商品</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const FB={apiKey:"AIzaSyC103Q-v31-z7nHnnM8KpIZbrrzjrGgGJ4",authDomain:"fir-config-f2e57.firebaseapp.com",projectId:"fir-config-f2e57",storageBucket:"fir-config-f2e57.firebasestorage.app",messagingSenderId:"860181486529",appId:"1:860181486529:web:6f7053a9141694afc66d40"};
const ADMINS=["lucky851228@gmail.com"];
const app=initializeApp(FB); const auth=getAuth(app); const db=getFirestore(app); const storage=getStorage(app);

const $=id=>document.getElementById(id);
let imgFile=null, imgTab='upload', editId=null;

window.toggleSB=s=>{$('main-sb').classList.toggle('open',s);$('sb-overlay').classList.toggle('open',s)};
window.go=n=>{
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('on'));
  $(`pg-${n}`).classList.add('on');
  document.querySelector(`[data-pg="${n}"]`)?.classList.add('on');
  $('tb-title').textContent=n; toggleSB(false);
  if(n==='dashboard')loadDash(); 
  if(n==='products')loadProducts(); 
  if(n==='add-product')resetForm();
};

onAuthStateChanged(auth, u=>{
  $('loading-screen').style.opacity='0'; setTimeout(()=>$('loading-screen').style.display='none',300);
  if(u && ADMINS.includes(u.email)){
    $('login-screen').style.display='none'; $('admin').classList.add('on'); 
    $('sb-name').textContent = u.email;
    loadDash();
  } else {
    if(u) signOut(auth); $('login-screen').style.display='flex'; $('admin').classList.remove('on');
  }
});

$('btn-login').onclick=async()=>{
  const e=$('a-email').value, p=$('a-pass').value;
  try{ await signInWithEmailAndPassword(auth,e,p); }catch(err){ alert('登入失敗'); }
};
window.handleLogout = () => signOut(auth);

window.switchTab=t=>{
  imgTab=t; ['upload','url','emoji'].forEach(x=>{$(`panel-${x}`).style.display=(x===t?'block':'none');$(`tab-${x}`).classList.toggle('on',x===t)});
};

window.onFileChange=i=>{
  imgFile=i.files[0]; if(!imgFile) return;
  const r=new FileReader(); r.onload=e=>{ $('img-prev').src=e.target.result; $('img-prev').classList.add('img-prev-active'); $('img-ph').style.display='none'; }; r.readAsDataURL(imgFile);
};

$('btn-save').onclick=async()=>{
  const n=$('pf-name').value; const p=parseFloat($('pf-price').value);
  if(!n||!p) return alert('請輸入商品名稱與售價');
  
  $('btn-save').disabled=true; $('btn-save').textContent='處理中...';

  try {
    let finalUrl = '';
    if(imgTab==='upload' && imgFile){
      const path=`products/${Date.now()}_${imgFile.name}`;
      const task=uploadBytesResumable(ref(storage, path), imgFile);
      finalUrl = await new Promise((res,rej)=>{
        task.on('state_changed',s=>{
          const pct=(s.bytesTransferred/s.totalBytes)*100; $('img-prog').classList.add('show'); $('img-prog-bar').style.width=pct+'%';
        },rej,async()=>res(await getDownloadURL(task.snapshot.ref)));
      });
    } else if(imgTab==='url'){ finalUrl=$('pf-url').value; }

    const data={
      name:n, price:p, stock:parseInt($('pf-stock').value)||0, 
      emoji:$('pf-emoji').value||'🌿', imageUrl:finalUrl, 
      imageType:imgTab, active:$('pf-active').checked, updatedAt:serverTimestamp()
    };

    await addDoc(collection(db,'products'), data);
    alert('✅ 商品新增成功！'); go('products');
  } catch(e){ alert('失敗：'+e.message); }
  finally{ $('btn-save').disabled=false; $('btn-save').textContent='儲存商品'; $('img-prog').classList.remove('show'); }
};

async function loadProducts(){
  const body = $('p-body');
  body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px">載入中...</td></tr>';
  const s = await getDocs(collection(db, 'products'));
  const prods = s.docs.map(d=>({id:d.id, ...d.data()}));
  
  if(prods.length === 0) {
      body.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px">目前沒有商品</td></tr>';
      return;
  }

  body.innerHTML = prods.map(x=>`
    <tr style="border-bottom:1px solid #eee">
      <td style="padding:12px">
        ${x.imageUrl ? `<img src="${x.imageUrl}" style="width:32px;height:32px;object-fit:cover;border-radius:4px;vertical-align:middle;margin-right:8px">` : `<span style="font-size:1.2rem;margin-right:8px;vertical-align:middle">${x.emoji||'🌿'}</span>`}
        ${x.name}
      </td>
      <td style="padding:12px">NT$${x.price}</td>
      <td style="padding:12px">${x.stock}</td>
      <td style="padding:12px">${x.active?'<span class="tag t-on">上架中</span>':'<span class="tag t-off">已下架</span>'}</td>
      <td style="padding:12px"><button onclick="alert('ID: ${x.id}')">🔍</button></td>
    </tr>
  `).join('');
}

async function loadDash(){
  const [o,p] = await Promise.all([getDocs(collection(db, 'orders')), getDocs(collection(db, 'products'))]);
  $('kpi-o').textContent = o.size;
  $('kpi-pr').textContent = p.size;
}

function resetForm(){
    $('pf-name').value=''; $('pf-price').value=''; $('pf-stock').value='';
    $('img-prev').src=''; $('img-prev').classList.remove('img-prev-active');
    $('img-ph').style.display='block'; imgFile=null;
}
</script>
</body>
</html>
