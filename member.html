<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>會員中心 — 陽光花園 jackpipi</title>
  
  <link rel="stylesheet" href="global.css" />
  
  <style>
    /* ── 會員中心專屬樣式 ── */
    
    /* AUTH SCREEN (登入/註冊卡片) */
    .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: var(--nav-h) 16px 40px; }
    .auth-card { background: var(--white); border-radius: var(--r-lg); padding: 48px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); width: 100%; max-width: 440px; }
    .auth-tabs { display: flex; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
    .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 0.86rem; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: var(--t); margin-bottom: -1px; }
    .auth-tab.active { color: var(--forest); border-bottom-color: var(--moss); }
    .auth-form { display: none; }
    .auth-form.active { display: block; animation: fadeIn .3s ease; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:translateY(0)} }
    
    /* MEMBER LAYOUT (側邊欄佈局) */
    .member-layout { display: none; padding-top: var(--nav-h); min-height: 100vh; }
    .member-layout.visible { display: grid; grid-template-columns: 240px 1fr; }

    .member-sidebar { background: var(--deep-forest); color: var(--cream); padding: 40px 0; position: sticky; top: var(--nav-h); height: calc(100vh - var(--nav-h)); overflow-y: auto; }
    .member-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--sage); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 16px; border: 3px solid rgba(255,255,255,.15); }
    .sidebar-link { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--r-md); font-size: 0.86rem; color: rgba(250,247,242,.65); cursor: pointer; transition: var(--t); margin: 0 16px; }
    .sidebar-link:hover, .sidebar-link.active { background: rgba(107,124,92,0.25); color: var(--cream); }
    
    .member-main { padding: 40px; background: var(--bg); }
    .page { display: none; }
    .page.active { display: block; animation: fadeIn .3s ease; }

    /* 🟢 訂單卡片深度美化 */
    .order-card {
      background: var(--white); border-radius: var(--r-lg); padding: 24px; 
      border: 1px solid var(--border); box-shadow: var(--shadow-sm); margin-bottom: 20px;
      position: relative; overflow: hidden; transition: transform 0.3s;
    }
    .order-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .order-card::before { content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%; background: var(--forest); }
    .order-hd { border-bottom: 1px dashed var(--border); padding-bottom: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .order-item-chip { background: var(--sand-light); border: 1px solid var(--border); padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; color: var(--forest); display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .order-total { font-weight: 700; font-family: var(--font-mono); color: var(--terracotta); font-size: 1.1rem; }

    /* DASHBOARD CARDS */
    .dash-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .dash-card { background: var(--white); border-radius: var(--r-lg); padding: 24px; border: 1px solid var(--border); text-align: center; }
    .dash-card__num { font-family: var(--font-display); font-size: 2rem; color: var(--forest); line-height: 1; margin-top: 8px; }

    @media(max-width: 900px) {
      .member-layout.visible { grid-template-columns: 1fr; }
      .member-sidebar { position: static; height: auto; padding: 20px 0; }
      .sidebar-nav { display: flex; flex-direction: row; overflow-x: auto; padding: 0 16px; }
      .sidebar-link { white-space: nowrap; margin: 0; }
      .dash-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="member">

<div class="auth-screen" id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">陽光花園 jackpipi</div>
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login">登入</div>
      <div class="auth-tab" data-tab="register">建立帳號</div>
    </div>
    <div class="auth-msg" id="auth-msg"></div>

    <div class="auth-form active" id="form-login">
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="l-email" placeholder="you@example.com"/></div>
      <div class="form-group"><label class="form-label">密碼</label><input type="password" class="form-input" id="l-pass" placeholder="••••••••"/></div>
      <button class="btn btn--primary btn--full" id="btn-login" style="margin-top:20px;">登入系統</button>
      <div class="auth-divider">或</div>
      <button class="btn btn--outline btn--full" id="btn-google-login">使用 Google 帳號登入</button>
    </div>

    <div class="auth-form" id="form-register">
      <div class="form-group"><label class="form-label">顯示名稱</label><input type="text" class="form-input" id="r-name" placeholder="王小明"/></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="r-email" placeholder="you@example.com"/></div>
      <div class="form-group"><label class="form-label">密碼</label><input type="password" class="form-input" id="r-pass" placeholder="至少 6 個字元"/></div>
      <button class="btn btn--primary btn--full" id="btn-register" style="margin-top:20px;">建立帳號</button>
    </div>
  </div>
</div>

<div class="member-layout" id="member-layout">
  <aside class="member-sidebar">
    <div class="member-avatar" id="m-avatar">🌿</div>
    <p style="text-align:center; margin-bottom:30px;" id="m-name">載入中...</p>
    <nav class="sidebar-nav">
      <div class="sidebar-link active" data-page="dashboard">🏠 總覽</div>
      <div class="sidebar-link" data-page="orders">📦 訂單記錄</div>
      <div class="sidebar-link" data-page="wishlist">❤️ 收藏清單</div>
      <div class="sidebar-link" data-page="profile">👤 個人資料</div>
      <div style="height:1px; background:rgba(255,255,255,0.1); margin:15px 16px;"></div>
      <div class="sidebar-link" style="color:var(--blush)" id="btn-logout">🚪 登出</div>
    </nav>
  </aside>

  <main class="member-main">
    <div class="page active" id="page-dashboard">
      <h1 class="page-title">你好，<em id="dash-name">植物愛好者</em></h1>
      <div class="dash-cards">
        <div class="dash-card"><div>📦</div><div class="dash-card__num" id="dash-order-count">0</div><p>累計訂單</p></div>
        <div class="dash-card"><div>❤️</div><div class="dash-card__num" id="dash-wish-count">0</div><p>收藏植物</p></div>
        <div class="dash-card"><div>🌿</div><div class="dash-card__num" id="dash-spent">NT$ 0</div><p>累計消費</p></div>
      </div>
      <p style="font-family:var(--font-mono); font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; margin-bottom:15px;">最近訂單</p>
      <div id="dash-recent-orders"></div>
    </div>

    <div class="page" id="page-orders">
      <h1 class="page-title">訂單<em>記錄</em></h1>
      <div id="orders-list" style="margin-top:30px;"></div>
    </div>

    <div class="page" id="page-wishlist">
      <h1 class="page-title">我的<em>收藏</em></h1>
      <div id="wishlist-grid" class="wishlist-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-top:30px;"></div>
    </div>

    <div class="page" id="page-profile">
      <h1 class="page-title">個人<em>資料</em></h1>
      <div class="card" style="background:#fff; padding:30px; border-radius:var(--r-lg); border:1px solid var(--border); margin-top:30px; max-width:600px;">
        <div class="form-group"><label class="form-label">顯示名稱</label><input type="text" class="form-input" id="p-name"/></div>
        <div class="form-group"><label class="form-label">聯絡電話</label><input type="tel" class="form-input" id="p-phone"/></div>
        <div class="form-group"><label class="form-label">收件地址</label><input type="text" class="form-input" id="p-addr"/></div>
        <button class="btn btn--primary" id="btn-save-profile" style="margin-top:10px;">儲存變更</button>
        <p id="save-msg" style="color:var(--success); font-size:0.8rem; margin-top:10px; display:none;">✓ 資料已更新</p>
      </div>
    </div>
  </main>
</div>

<script type="module">
  import { db, auth, googleProvider } from "./firebase-config.js";
  import { Cart, showToast } from "./global.js";
  import { signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, getDoc, setDoc, collection, query, where, orderBy, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const escapeHTML = value => String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[ch]));

  // 1. Auth 狀態監聽
  onAuthStateChanged(auth, async user => {
    if(user){
      document.getElementById("auth-screen").style.display="none";
      document.getElementById("member-layout").style.display="grid";
      document.getElementById("member-layout").classList.add("visible");
      setMemberUI(user);
      await loadUserData(user);
    } else {
      document.getElementById("auth-screen").style.display="flex";
      document.getElementById("member-layout").style.display="none";
    }
  });

  function setMemberUI(user){
    const name = user.displayName || user.email.split("@")[0];
    document.getElementById("m-name").textContent = name;
    document.getElementById("dash-name").textContent = name;
    document.getElementById("m-avatar").textContent = name.charAt(0).toUpperCase();
    document.getElementById("p-name").value = user.displayName || "";
  }

  // 2. 載入資料
  async function loadUserData(user){
    // 訂單
    const oSnap = await getDocs(query(collection(db,"orders"), where("userId","==",user.uid), orderBy("createdAt","desc")));
    const orders = oSnap.docs.map(d=>({...d.data(), id:d.id}));
    
    // KPI 更新
    document.getElementById("dash-order-count").textContent = orders.length;
    const spent = orders.reduce((s,o)=>s+(o.total||0), 0);
    document.getElementById("dash-spent").textContent = `NT$ ${spent.toLocaleString()}`;

    // 渲染清單
    renderOrders(orders);
    
    // 使用者額外資料
    const uDoc = await getDoc(doc(db,"users",user.uid));
    if(uDoc.exists()){
      const d = uDoc.data();
      if(d.phone) document.getElementById("p-phone").value = d.phone;
      if(d.addr)  document.getElementById("p-addr").value = d.addr;
    }
  }

  function renderOrders(orders){
    const renderOrderCard = o => {
      const date = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleDateString() : "—";
      const items = (o.items||[]).map(i => `<span class="order-item-chip">${escapeHTML(i.emoji || "🌿")} ${escapeHTML(i.name)} × ${escapeHTML(i.qty)}</span>`).join("");
      return `
        <div class="order-card">
          <div class="order-hd">
            <span style="font-family:var(--font-mono); font-size:0.8rem; color:var(--text-muted);">${escapeHTML(o.orderId || o.id.slice(0,8))}</span>
            <span class="badge" style="background:var(--sage); position:static;">${escapeHTML(o.status || '待處理')}</span>
          </div>
          <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;">${items}</div>
          <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); padding-top:12px;">
            <span style="font-size:0.75rem; color:var(--text-light);">${escapeHTML(date)}</span>
            <span class="order-total">NT$ ${(o.total||0).toLocaleString()}</span>
          </div>
        </div>`;
    };
    const list = orders.map(renderOrderCard).join("");
    document.getElementById("orders-list").innerHTML = list || "<p>尚無訂單記錄</p>";
    document.getElementById("dash-recent-orders").innerHTML = orders.length ? orders.slice(0,1).map(renderOrderCard).join("") : "<p>尚無訂單記錄</p>";
  }

  // 3. 事件綁定
  document.getElementById("btn-login").onclick = async () => {
    const email = document.getElementById("l-email").value;
    const pass = document.getElementById("l-pass").value;
    try { await signInWithEmailAndPassword(auth, email, pass); } catch(e) { alert("登入失敗: " + e.message); }
  };

  document.getElementById("btn-google-login").onclick = () => signInWithPopup(auth, googleProvider);
  document.getElementById("btn-logout").onclick = () => signOut(auth);

  document.getElementById("btn-register").onclick = async () => {
    const name = document.getElementById("r-name").value.trim();
    const email = document.getElementById("r-email").value.trim();
    const pass = document.getElementById("r-pass").value;
    if (!email || !pass) return alert("請填寫 Email 與密碼");
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      if (name) await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, "users", cred.user.uid), {
        displayName: name || email.split("@")[0],
        updatedAt: serverTimestamp()
      }, { merge: true });
    } catch(e) {
      alert("建立帳號失敗: " + e.message);
    }
  };

  document.querySelectorAll(".sidebar-link[data-page]").forEach(link => {
    link.onclick = () => {
      document.querySelectorAll(".sidebar-link").forEach(l => l.classList.remove("active"));
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      link.classList.add("active");
      document.getElementById("page-" + link.dataset.page).classList.add("active");
    };
  });

  document.getElementById("btn-save-profile").onclick = async () => {
    const name = document.getElementById("p-name").value;
    const phone = document.getElementById("p-phone").value;
    const addr = document.getElementById("p-addr").value;
    try {
      await updateProfile(auth.currentUser, { displayName: name });
      await setDoc(doc(db,"users",auth.currentUser.uid), { displayName: name, phone, addr, updatedAt: serverTimestamp() }, { merge: true });
      document.getElementById("save-msg").style.display = "block";
      setTimeout(() => document.getElementById("save-msg").style.display = "none", 2500);
    } catch(e) { alert("儲存失敗"); }
  };

  // Auth Tab 切換
  document.querySelectorAll(".auth-tab").forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".auth-form").forEach(f => f.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("form-" + tab.dataset.tab).classList.add("active");
    };
  });
</script>
</body>
</html>
