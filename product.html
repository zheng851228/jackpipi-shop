<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>所有植物 — 陽光花園 jackpipi</title>
  
  <link rel="stylesheet" href="global.css" />
  
  <style>
    /* ── 頁面專屬佈局 ── */
    .shop-layout { display: grid; grid-template-columns: 240px 1fr; gap: 48px; padding: calc(var(--nav-h) + 40px) 0 100px; }
    
    /* 側邊篩選器 */
    .sidebar-title { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .filter-btn { display: block; width: 100%; text-align: left; padding: 10px 14px; margin-bottom: 6px; border-radius: var(--r-sm); font-size: 0.88rem; color: var(--text-muted); transition: var(--t); }
    .filter-btn:hover, .filter-btn.active { background: var(--forest); color: var(--cream); }

    /* 商品網格 */
    .product-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    #product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 32px; }
    
    /* 🟡 圖片讀取優化樣式 */
    .card-img { 
      aspect-ratio: 1/1; 
      background: #f0f0f0; 
      display: flex; align-items: center; justify-content: center; 
      overflow: hidden; position: relative; border-radius: var(--r-lg) var(--r-lg) 0 0;
      /* 骨架屏動畫 */
      background: linear-gradient(90deg, #f2f2f2 25%, #e6e6e6 50%, #f2f2f2 75%);
      background-size: 200% 100%;
      animation: skeleton-loading 1.5s infinite;
    }
    @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .card-img img { 
      width: 100%; height: 100%; object-fit: cover; 
      opacity: 0; /* 初始透明 */
      transition: opacity 0.8s var(--ease); 
    }
    .card-img img.loaded { opacity: 1; } /* 載入後淡入 */

    .product-card { 
      background: var(--white); border-radius: var(--r-lg); border: 1px solid var(--border); 
      display: flex; flex-direction: column; transition: var(--t); 
    }
    .product-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }
    .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .card-name { font-size: 1.15rem; font-weight: 700; color: var(--deep-forest); margin-bottom: 8px; }
    .card-price { font-family: var(--font-mono); color: var(--forest); font-weight: 500; font-size: 1rem; }

    /* RWD 手機版調整 */
    @media (max-width: 900px) {
      .shop-layout { grid-template-columns: 1fr; gap: 32px; }
      .sidebar { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; -webkit-overflow-scrolling: touch; }
      .sidebar-title { display: none; }
      .filter-btn { white-space: nowrap; width: auto; border: 1px solid var(--border); }
    }
  </style>
</head>

<body data-page="product">

<div class="container shop-layout">
  
  <aside class="sidebar">
    <p class="sidebar-title">植物分類</p>
    <button class="filter-btn active" data-cat="">全部植物</button>
    <button class="filter-btn" data-cat="beginner">🌱 新手入門</button>
    <button class="filter-btn" data-cat="collector">🪴 資深玩家</button>
    <button class="filter-btn" data-cat="media-tools">🪣 介質與工具</button>
  </aside>

  <main>
    <div class="product-toolbar">
      <h2 style="font-family:var(--font-display); font-weight:300;">探索<em>綠意</em></h2>
      <span id="product-count" style="font-size:0.8rem; color:var(--text-light); font-family:var(--font-mono);">載入中...</span>
    </div>
    
    <div id="product-grid">
      <div class="product-card" style="height:350px; background:#f9f9f9; opacity:0.5;"></div>
      <div class="product-card" style="height:350px; background:#f9f9f9; opacity:0.5;"></div>
      <div class="product-card" style="height:350px; background:#f9f9f9; opacity:0.5;"></div>
    </div>
  </main>

</div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="global.js"></script>

<script type="module">
import { db } from "./firebase-config.js";
import { Cart, showToast } from "./global.js"; 
import { collection, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let allProducts = [];
let currentCategory = '';

// 🟢 啟動監聽
function init() {
  const q = query(collection(db, "products"), where("active", "==", true));
  
  onSnapshot(q, (snapshot) => {
    allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
  }, (err) => {
    console.error("Firebase Error:", err);
    document.getElementById('product-grid').innerHTML = `<p>讀取失敗，請檢查網路連線。</p>`;
  });
}

// 🟢 渲染邏輯 (整合 Lazy Loading 與 Fade-in)
function render() {
  const grid = document.getElementById('product-grid');
  const countEl = document.getElementById('product-count');
  
  let list = allProducts;
  if (currentCategory) {
    list = list.filter(p => p.category === currentCategory);
  }

  countEl.textContent = `${list.length} ITEMS`;

  if (list.length === 0) {
    grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:100px 0; color:var(--text-light);">此分類目前沒有商品。</p>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const isOut = p.stock <= 0;
    
    // 💡 圖片讀取優化：使用 loading="lazy" 並在載入後加入 .loaded class
    const media = p.imageUrl 
      ? `<img src="${p.imageUrl}" 
              alt="${p.name}" 
              loading="lazy" 
              decoding="async" 
              onload="this.classList.add('loaded'); this.parentElement.style.animation='none';">`
      : `<div style="font-size:4rem;">${p.emoji || '🌿'}</div>`;

    return `
      <article class="product-card" style="${isOut ? 'opacity:0.7; filter:grayscale(0.6);' : ''}">
        <div class="card-img">
          ${p.featured ? '<span class="badge badge--hot" style="position:absolute;top:15px;left:15px;z-index:2">HOT</span>' : ''}
          ${media}
        </div>
        <div class="card-body">
          <p style="font-size:0.7rem; color:var(--moss); font-family:var(--font-mono); margin-bottom:5px; text-transform:uppercase;">${p.category}</p>
          <h3 class="card-name">${p.name}</h3>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto; padding-top:15px;">
            <p class="card-price">NT$ ${p.price.toLocaleString()}</p>
            <button class="btn btn--primary add-to-cart-btn" 
                    data-id="${p.id}" 
                    style="padding:8px 16px; font-size:0.8rem;" 
                    ${isOut ? 'disabled' : ''}>
              ${isOut ? '已售完' : '加入購物車'}
            </button>
          </div>
        </div>
      </article>
    `;
  }).join('');
}

// 🟢 篩選按鈕事件
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = (e) => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentCategory = e.target.dataset.cat;
    render();
  };
});

// 🟢 加入購物車事件 (使用 global.js 模組)
document.getElementById('product-grid').onclick = (e) => {
  const btn = e.target.closest('.add-to-cart-btn');
  if (!btn) return;
  
  const product = allProducts.find(x => x.id === btn.dataset.id);
  if (product) {
    Cart.add({
      id: product.id,
      name: product.name,
      price: product.price,
      emoji: product.emoji,
      imageUrl: product.imageUrl
    });
    showToast(`✦ 已將 ${product.name} 加入購物車`);
  }
};

init();
</script>

</body>
</html>
