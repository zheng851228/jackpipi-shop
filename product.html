<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>所有植物 — 陽光花園 jackpipi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --sage:#A8B5A2;--moss:#6B7C5C;--forest:#3D5040;--deep-forest:#253228;
  --sand:#E8DDD0;--sand-light:#F5F0EA;--blush:#D4A8A0;--terracotta:#B5704F;
  --cream:#FAF7F2;--bg:#F5F2EE;--white:#FFFFFF;--text:#2E2E2E;--text-muted:#7A7A7A;--text-light:#ABABAB;
  --border:rgba(107,124,92,0.15);
  --shadow-sm:0 2px 12px rgba(61,80,64,0.07);
  --shadow-md:0 8px 32px rgba(61,80,64,0.11);
  --shadow-lg:0 20px 60px rgba(61,80,64,0.15);
  --radius-md:12px;--radius-lg:20px;--radius-full:999px;
  --font-serif:'Noto Serif TC',serif;
  --font-display:'Cormorant Garamond',serif;
  --font-mono:'DM Mono',monospace;
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);
  --nav-height:72px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-serif);background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%;object-fit:cover}
a{color:inherit;text-decoration:none}
ul{list-style:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--sage);border-radius:3px}
.container{max-width:1200px;margin:0 auto;padding:0 24px}

/* ── NAV ── */
.nav{position:fixed;top:0;width:100%;z-index:100;height:var(--nav-height);background:rgba(245,242,238,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;transition:all .3s}
.nav__inner{display:flex;align-items:center;justify-content:space-between;width:100%}
.nav__logo{font-family:var(--font-serif);font-size:1.2rem;font-weight:700;color:var(--forest);letter-spacing:0.04em}
.nav__links{display:flex;gap:36px}
.nav__link{font-size:0.86rem;color:var(--text-muted);letter-spacing:0.05em;transition:color var(--transition);position:relative}
.nav__link::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--moss);transform:scaleX(0);transform-origin:left;transition:transform var(--transition)}
.nav__link:hover,.nav__link.active{color:var(--forest)}
.nav__link:hover::after,.nav__link.active::after{transform:scaleX(1)}
.nav__cart{display:flex;align-items:center;gap:6px;padding:8px 18px;background:var(--forest);color:var(--cream);border-radius:var(--radius-full);font-size:0.8rem;letter-spacing:0.06em;transition:all var(--transition);cursor:pointer}
.nav__cart:hover{background:var(--deep-forest);transform:translateY(-1px)}
.cart-count{display:none;align-items:center;justify-content:center;width:18px;height:18px;background:var(--blush);color:#fff;border-radius:50%;font-size:0.68rem;font-family:var(--font-mono)}

/* ── PAGE HEADER ── */
.page-header{padding:calc(var(--nav-height) + 60px) 0 60px;background:linear-gradient(135deg,var(--sand-light) 0%,var(--bg) 100%);position:relative;overflow:hidden}
.page-header::before{content:'';position:absolute;right:-100px;top:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(168,181,162,0.15),transparent 70%);pointer-events:none}
.page-header__eyebrow{font-family:var(--font-mono);font-size:0.72rem;letter-spacing:0.16em;color:var(--moss);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.page-header__eyebrow::before{content:'';width:22px;height:1px;background:var(--moss)}
.page-header__title{font-family:var(--font-display);font-size:clamp(2.4rem,5vw,3.8rem);font-weight:300;color:var(--deep-forest);line-height:1.1;margin-bottom:16px}
.page-header__title em{font-style:italic;color:var(--terracotta)}
.page-header__desc{font-size:0.95rem;color:var(--text-muted);max-width:480px;line-height:1.8}

/* ── LAYOUT ── */
.shop-layout{display:grid;grid-template-columns:240px 1fr;gap:48px;padding:60px 0 100px;align-items:start}

/* ── SIDEBAR ── */
.sidebar{position:sticky;top:calc(var(--nav-height) + 24px)}
.sidebar-section{margin-bottom:36px}
.sidebar-title{font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.14em;color:var(--text-light);text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.filter-list{display:flex;flex-direction:column;gap:4px}
.filter-option{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition);font-size:0.86rem;color:var(--text-muted)}
.filter-option:hover{background:rgba(107,124,92,0.07);color:var(--forest)}
.filter-option.active{background:var(--forest);color:var(--cream)}
.filter-option__count{font-family:var(--font-mono);font-size:0.72rem;opacity:0.6}
.filter-option.active .filter-option__count{opacity:0.7}

.difficulty-filter{display:flex;flex-direction:column;gap:6px}
.diff-btn{padding:8px 14px;border-radius:var(--radius-md);font-size:0.82rem;color:var(--text-muted);border:1px solid var(--border);background:transparent;transition:all var(--transition);text-align:left;cursor:pointer}
.diff-btn:hover{border-color:var(--moss);color:var(--forest)}
.diff-btn.active{background:var(--sage);color:var(--white);border-color:var(--sage)}

.sort-select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-md);font-family:var(--font-serif);font-size:0.86rem;color:var(--text);background:var(--white);appearance:none;cursor:pointer;outline:none;transition:border-color var(--transition)}
.sort-select:focus{border-color:var(--moss)}

/* ── PRODUCT AREA ── */
.product-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.product-count{font-family:var(--font-mono);font-size:0.78rem;color:var(--text-muted);letter-spacing:0.06em}
.view-toggle{display:flex;gap:6px}
.view-btn{padding:7px;border-radius:var(--radius-md);color:var(--text-light);transition:all var(--transition);border:1px solid transparent}
.view-btn:hover,.view-btn.active{color:var(--forest);border-color:var(--border);background:var(--white)}

#product-grid{display:grid;gap:24px;transition:all .3s}
#product-grid.grid-3{grid-template-columns:repeat(3,1fr)}
#product-grid.grid-2{grid-template-columns:repeat(2,1fr)}

/* ── PRODUCT CARD ── */
.product-card{background:var(--white);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid rgba(168,181,162,0.18);display:flex;flex-direction:column;transition:transform var(--transition),box-shadow var(--transition);animation:cardIn .4s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.product-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg)}
.card-img{position:relative;aspect-ratio:1/1;overflow:hidden;background:var(--sand-light);display:flex;align-items:center;justify-content:center;font-size:4rem}
.card-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.product-card:hover .card-img img{transform:scale(1.06)}
.badge{position:absolute;top:10px;left:10px;padding:3px 10px;border-radius:var(--radius-full);font-size:0.68rem;font-family:var(--font-mono);letter-spacing:0.07em}
.badge--hot{background:var(--terracotta);color:#fff}
.badge--sale{background:var(--blush);color:#fff}
.badge--new{background:var(--moss);color:#fff}
.pet-safe{position:absolute;top:10px;right:10px;background:rgba(255,255,255,0.92);padding:3px 8px;border-radius:var(--radius-full);font-size:0.65rem;font-family:var(--font-mono);color:#4a8a4e;backdrop-filter:blur(4px)}

.card-body{padding:18px;display:flex;flex-direction:column;flex:1;gap:5px}
.card-cat{font-size:0.68rem;font-family:var(--font-mono);letter-spacing:0.1em;color:var(--sage);text-transform:uppercase}
.card-name{font-family:var(--font-serif);font-size:1rem;font-weight:500;color:var(--deep-forest)}
.card-species{font-size:0.72rem;font-style:italic;color:var(--text-light);font-family:var(--font-display)}
.card-stars{font-size:0.75rem;color:var(--terracotta);letter-spacing:0.04em}
.card-desc{font-size:0.8rem;color:var(--text-muted);line-height:1.6;flex:1;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.card-price{font-family:var(--font-mono);font-size:0.96rem;color:var(--forest)}
.card-price del{font-size:0.76rem;color:var(--text-light);margin-left:5px}
.btn-cart{padding:7px 15px;background:var(--forest);color:var(--cream);border-radius:var(--radius-full);font-size:0.76rem;font-family:var(--font-serif);letter-spacing:0.04em;transition:all var(--transition);border:none;cursor:pointer}
.btn-cart:hover{background:var(--deep-forest);transform:scale(1.04)}
.btn-cart.added{background:var(--sage);pointer-events:none}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--sand) 25%,var(--sand-light) 50%,var(--sand) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* EMPTY STATE */
.empty-state{grid-column:1/-1;text-align:center;padding:80px 0;color:var(--text-muted)}
.empty-state svg{margin:0 auto 16px;opacity:0.25}

/* ── CART DRAWER ── */
.cart-overlay{position:fixed;inset:0;background:rgba(37,50,40,0.4);z-index:200;opacity:0;pointer-events:none;transition:opacity var(--transition);backdrop-filter:blur(2px)}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:min(400px,95vw);background:var(--white);z-index:201;transform:translateX(100%);transition:transform .35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.cart-drawer.open{transform:translateX(0)}
.cart-hd{display:flex;align-items:center;justify-content:space-between;padding:22px;border-bottom:1px solid var(--border)}
.cart-hd h2{font-family:var(--font-serif);font-size:1.05rem;font-weight:500;color:var(--deep-forest)}
.cart-close-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text-muted);transition:all var(--transition);cursor:pointer}
.cart-close-btn:hover{background:var(--sand);color:var(--forest)}
.cart-bd{flex:1;overflow-y:auto;padding:20px}
.cart-empty-msg{text-align:center;padding:56px 0;color:var(--text-light);font-size:0.88rem}
.cart-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.ci-thumb{width:60px;height:60px;border-radius:var(--radius-md);background:var(--sand-light);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
.ci-info{flex:1}
.ci-name{font-size:0.86rem;font-weight:500;color:var(--deep-forest);margin-bottom:3px}
.ci-size{font-size:0.72rem;color:var(--text-light);font-family:var(--font-mono);margin-bottom:8px}
.ci-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:var(--text-muted);cursor:pointer;transition:all var(--transition)}
.qty-btn:hover{border-color:var(--moss);color:var(--forest)}
.qty-val{font-family:var(--font-mono);font-size:0.82rem;min-width:14px;text-align:center}
.ci-price{font-family:var(--font-mono);font-size:0.86rem;color:var(--forest);align-self:flex-start;white-space:nowrap}
.cart-ft{padding:20px;border-top:1px solid var(--border);background:var(--sand-light)}
.cart-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:0.9rem;color:var(--text-muted)}
.cart-total-row{display:flex;justify-content:space-between;margin-bottom:18px;font-weight:500;font-size:1rem;color:var(--deep-forest)}
.cart-total-row span:last-child{font-family:var(--font-mono);color:var(--forest)}
.btn-checkout{width:100%;padding:14px;background:var(--forest);color:var(--cream);border-radius:var(--radius-full);font-size:0.88rem;font-family:var(--font-serif);letter-spacing:0.05em;transition:all var(--transition);border:none;cursor:pointer}
.btn-checkout:hover{background:var(--deep-forest)}

/* TOAST */
.toast-wrap{position:fixed;bottom:28px;right:28px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:11px 18px;background:var(--deep-forest);color:var(--cream);border-radius:var(--radius-md);font-size:0.8rem;box-shadow:var(--shadow-md);animation:toastIn .3s ease;display:flex;align-items:center;gap:7px}
@keyframes toastIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastOut{to{opacity:0;transform:translateX(18px)}}

/* RWD */
@media(max-width:1024px){
  .shop-layout{grid-template-columns:200px 1fr;gap:32px}
  #product-grid.grid-3{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .nav__links{display:none}
  .shop-layout{grid-template-columns:1fr}
  .sidebar{position:static;display:none}
  .sidebar.mobile-open{display:block}
  #product-grid.grid-3,#product-grid.grid-2{grid-template-columns:repeat(2,1fr)}
  .toast-wrap{bottom:16px;right:16px;left:16px}
}
@media(max-width:480px){
  .container{padding:0 16px}
  #product-grid.grid-3,#product-grid.grid-2{grid-template-columns:1fr 1fr;gap:12px}
  .card-body{padding:13px}
}
</style>
</head>

// ── 商品資料 ──
const PRODUCTS = [

  {id:"TOOL-002",name:"長嘴澆水壺 500ml",category:"media-tools",taxonomy:null,price:280,originalPrice:320,size:"500ml",stock:18,difficulty:null,diffLabel:null,sunlight:null,water:null,emoji:"🚿",desc:"細長壺嘴設計，水流精準落在根部，不讓葉片沾水，有效避免積水造成的腐爛。",featured:false,petSafe:true},
  {id:"TOOL-003",name:"不鏽鋼迷你工具組 3件",category:"media-tools",taxonomy:null,price:350,originalPrice:350,size:"鏟/耙/叉各一",stock:22,difficulty:null,diffLabel:null,sunlight:null,water:null,emoji:"🔧",desc:"304 不鏽鋼打造，迷你尺寸完美適配 1–3 吋盆。鬆土、移植、整理側芽一套解決。",featured:true,petSafe:true}
];

// ── 狀態 ──
let cart = JSON.parse(localStorage.getItem('jk_cart')||'[]');
let state = {cat:'',diff:'',pet:false,sale:false,feat:false,sort:'default'};

function saveCart(){localStorage.setItem('jk_cart',JSON.stringify(cart))}
function getTotal(){return cart.reduce((s,i)=>s+i.price*i.qty,0)}
function getCount(){return cart.reduce((s,i)=>s+i.qty,0)}

// ── 篩選 & 排序 ──
function filterAndSort(){
  let list = [...PRODUCTS];
  if(state.cat) list = list.filter(p=>p.category===state.cat);
  if(state.diff) list = list.filter(p=>p.difficulty===parseInt(state.diff));
  if(state.pet) list = list.filter(p=>p.petSafe);
  if(state.sale) list = list.filter(p=>p.originalPrice>p.price);
  if(state.feat) list = list.filter(p=>p.featured);
  if(state.sort==='price-asc') list.sort((a,b)=>a.price-b.price);
  if(state.sort==='price-desc') list.sort((a,b)=>b.price-a.price);
  if(state.sort==='name') list.sort((a,b)=>a.name.localeCompare(b.name));
  return list;
}

// ── 渲染商品 ──
function getCatLabel(c){return{beginner:'🌱 新手入門',collector:'🪴 資深玩家','media-tools':'🪣 介質工具'}[c]||c}

function renderProducts(){
  const grid = document.getElementById('product-grid');
  const list = filterAndSort();
  document.getElementById('product-count').textContent = `顯示 ${list.length} 件商品`;

  if(!list.length){
    grid.innerHTML=`<div class="empty-state"><svg width="60" height="60" viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".3"><circle cx="30" cy="30" r="24"/><path d="M22 30h16M30 22v16"/></svg><p>沒有符合條件的商品</p><p style="font-size:0.8rem;margin-top:8px;color:var(--text-light)">請嘗試調整篩選條件</p></div>`;
    return;
  }

  grid.innerHTML='';
  list.forEach((p,i)=>{
    const sale = p.originalPrice>p.price;
    const card = document.createElement('article');
    card.className='product-card';
    card.style.animationDelay=`${i*50}ms`;
    card.innerHTML=`
      <div class="card-img">
        <span style="font-size:3.8rem">${p.emoji}</span>
        ${p.featured?'<span class="badge badge--hot">熱銷</span>':sale?'<span class="badge badge--sale">特價</span>':''}
        ${p.petSafe?'<span class="pet-safe">🐾 友善</span>':''}
      </div>
      <div class="card-body">
        <p class="card-cat">${getCatLabel(p.category)}</p>
        <h3 class="card-name">${p.name}</h3>
        ${p.taxonomy?`<p class="card-species">${p.taxonomy.species}</p>`:''}
        ${p.diffLabel?`<p class="card-stars">${p.diffLabel}</p>`:''}
        <p class="card-desc">${p.desc}</p>
        <div class="card-footer">
          <p class="card-price">NT$ ${p.price}${sale?`<del>NT$ ${p.originalPrice}</del>`:''}</p>
          <button class="btn-cart" data-id="${p.id}">加入</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ── 購物車 ──
function addToCart(id){
  const p=PRODUCTS.find(x=>x.id===id);if(!p)return;
  const ex=cart.find(x=>x.id===id);
  if(ex)ex.qty++;else cart.push({id:p.id,name:p.name,price:p.price,size:p.size,emoji:p.emoji,qty:1});
  saveCart();updateCartCount();showToast(`✦ ${p.name} 已加入購物車`);
}
function updateCartCount(){
  const n=getCount();
  const el=document.getElementById('cart-count');
  el.textContent=n;el.style.display=n>0?'flex':'none';
}
function renderCart(){
  const body=document.getElementById('cart-body');
  const t=getTotal();
  document.getElementById('cart-sub').textContent=`NT$ ${t}`;
  document.getElementById('cart-total').textContent=`NT$ ${t}`;
  if(!cart.length){body.innerHTML=`<div class="cart-empty-msg">🌵<br><br>購物車是空的<br><span style="font-size:0.78rem;color:var(--text-light)">去挑一株多肉回家吧</span></div>`;return;}
  body.innerHTML=cart.map(i=>`
    <div class="cart-item">
      <div class="ci-thumb">${i.emoji}</div>
      <div class="ci-info">
        <p class="ci-name">${i.name}</p>
        <p class="ci-size">${i.size}</p>
        <div class="ci-ctrl">
          <button class="qty-btn" data-action="dec" data-id="${i.id}">−</button>
          <span class="qty-val">${i.qty}</span>
          <button class="qty-btn" data-action="inc" data-id="${i.id}">+</button>
        </div>
      </div>
      <p class="ci-price">NT$ ${i.price*i.qty}</p>
    </div>`).join('');
}

// ── Toast ──
function showToast(msg){
  const wrap=document.getElementById('toast-wrap');
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  wrap.appendChild(t);
  setTimeout(()=>{t.classList.add('out');t.addEventListener('animationend',()=>t.remove(),{once:true});},2400);
}

// ── 事件 ──
document.getElementById('product-grid').addEventListener('click',e=>{
  const btn=e.target.closest('.btn-cart');if(!btn)return;
  addToCart(btn.dataset.id);
  btn.textContent='✓';btn.classList.add('added');
});

document.getElementById('open-cart').addEventListener('click',()=>{
  renderCart();
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
  document.body.style.overflow='hidden';
});
function closeCart(){
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('close-cart').addEventListener('click',closeCart);
document.getElementById('cart-overlay').addEventListener('click',closeCart);

document.getElementById('cart-body').addEventListener('click',e=>{
  const btn=e.target.closest('.qty-btn');if(!btn)return;
  const item=cart.find(x=>x.id===btn.dataset.id);if(!item)return;
  if(btn.dataset.action==='inc')item.qty++;
  else{item.qty--;if(item.qty<=0)cart.splice(cart.indexOf(item),1);}
  saveCart();updateCartCount();renderCart();
});

// 分類
document.getElementById('cat-filters').addEventListener('click',e=>{
  const el=e.target.closest('.filter-option');if(!el)return;
  document.querySelectorAll('#cat-filters .filter-option').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');state.cat=el.dataset.cat;renderProducts();
});

// 難度
document.getElementById('diff-filters').addEventListener('click',e=>{
  const btn=e.target.closest('.diff-btn');if(!btn)return;
  document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');state.diff=btn.dataset.diff;renderProducts();
});

// 排序
document.getElementById('sort-select').addEventListener('change',e=>{state.sort=e.target.value;renderProducts();});

// 特殊篩選
['pet-filter','sale-filter','featured-filter'].forEach(id=>{
  document.getElementById(id).addEventListener('click',()=>{
    const el=document.getElementById(id);
    if(id==='pet-filter'){state.pet=!state.pet;el.dataset.pet=state.pet;el.classList.toggle('active',state.pet)}
    if(id==='sale-filter'){state.sale=!state.sale;el.dataset.sale=state.sale;el.classList.toggle('active',state.sale)}
    if(id==='featured-filter'){state.feat=!state.feat;el.dataset.feat=state.feat;el.classList.toggle('active',state.feat)}
    renderProducts();
  });
});

// 檢視切換
document.querySelectorAll('.view-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const grid=document.getElementById('product-grid');
    grid.className=`grid-${btn.dataset.view}`;
  });
});

// URL 篩選參數
const params=new URLSearchParams(location.search);
if(params.get('filter')){
  state.cat=params.get('filter');
  const el=document.querySelector(`[data-cat="${state.cat}"]`);
  if(el){document.querySelectorAll('#cat-filters .filter-option').forEach(x=>x.classList.remove('active'));el.classList.add('active');}
}

// 導覽列滾動
window.addEventListener('scroll',()=>{
  const nav=document.getElementById('nav');
  nav.style.background=window.scrollY>40?'rgba(245,242,238,0.96)':'rgba(245,242,238,0.9)';
  nav.style.boxShadow=window.scrollY>40?'0 4px 20px rgba(0,0,0,0.05)':'none';
});

updateCartCount();
renderProducts();
</script>
</body>
</html>
