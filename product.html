<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>所有植物 — 陽光花園 jackpipi</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root {
  --sage:#A8B5A2; --moss:#6B7C5C; --forest:#3D5040; --deep-forest:#253228;
  --sand:#E8DDD0; --sand-light:#F5F0EA; --cream:#FAF7F2; --bg:#F5F2EE;
  --white:#FFFFFF; --text:#2E2E2E; --text-muted:#7A7A7A; --terracotta:#B5704F;
  --blush:#D4A8A0;
  --border:rgba(107,124,92,0.15);
  --shadow-sm:0 2px 12px rgba(61,80,64,0.07);
  --shadow-md:0 8px 32px rgba(61,80,64,0.11);
  --shadow-lg:0 24px 64px rgba(61,80,64,0.14);
  --radius-md:12px; --radius-lg:20px; --radius-full:999px;
  --font-serif:'Noto Serif TC',serif; --font-mono:'DM Mono',monospace;
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-serif);background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:inherit;border:none;background:none;}
.container{max-width:1200px;margin:0 auto;padding:0 24px;}

/* ── NAV ── */
.nav{position:fixed;top:0;width:100%;height:72px;background:rgba(245,242,238,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(–border);display:flex;align-items:center;z-index:100;transition:all .3s;}
.nav__inner{display:flex;justify-content:space-between;width:100%;align-items:center;}
.nav__logo{font-weight:700;color:var(–forest);font-size:1.15rem;letter-spacing:0.03em;}
.nav__links{display:flex;gap:28px;align-items:center;}
.nav__link{font-size:0.86rem;color:var(–text-muted);transition:color var(–transition);letter-spacing:0.04em;}
.nav__link:hover,.nav__link.active{color:var(–forest);}

/* 購物車按鈕 */
.nav__cart-btn{display:flex;align-items:center;gap:7px;padding:8px 18px;background:var(–forest);color:var(–cream);border-radius:var(–radius-full);font-size:0.8rem;letter-spacing:0.06em;transition:all var(–transition);cursor:pointer;}
.nav__cart-btn:hover{background:var(–deep-forest);transform:translateY(-1px);}
.cart-count{display:none;align-items:center;justify-content:center;width:18px;height:18px;background:var(–blush);color:#fff;border-radius:50%;font-size:0.62rem;font-family:var(–font-mono);font-weight:700;}

/* ── SHOP LAYOUT ── */
.shop-layout{display:grid;grid-template-columns:220px 1fr;gap:48px;padding:108px 0 100px;align-items:start;}

/* ── SIDEBAR ── */
.sidebar-title{font-family:var(–font-mono);font-size:0.68rem;color:var(–text-muted);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(–border);}
.filter-btn{display:block;width:100%;text-align:left;padding:9px 13px;margin-bottom:3px;border-radius:var(–radius-md);font-size:0.86rem;color:var(–text-muted);transition:all var(–transition);}
.filter-btn:hover,.filter-btn.active{background:var(–forest);color:var(–cream);}

/* ── TOOLBAR ── */
.product-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.product-count{font-size:0.84rem;color:var(–text-muted);font-family:var(–font-mono);}

/* ── PRODUCT GRID ── */
#product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:22px;}

/* ── PRODUCT CARD ── */
.product-card{background:var(–white);border-radius:var(–radius-lg);overflow:hidden;border:1px solid var(–border);display:flex;flex-direction:column;transition:transform var(–transition),box-shadow var(–transition);position:relative;}
.product-card:hover{transform:translateY(-5px);box-shadow:var(–shadow-md);}
.card-img{aspect-ratio:1/1;background:var(–sand-light);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;}
.product-card:hover .card-img img{transform:scale(1.04);}
.card-emoji{font-size:4rem;transition:transform .4s ease;}
.product-card:hover .card-emoji{transform:scale(1.08);}
.card-body{padding:18px;display:flex;flex-direction:column;flex:1;}
.card-cat{font-size:0.68rem;color:var(–moss);font-family:var(–font-mono);letter-spacing:0.08em;margin-bottom:5px;text-transform:uppercase;}
.card-name{font-size:1.05rem;font-weight:700;color:var(–deep-forest);margin-bottom:6px;line-height:1.3;}
.card-species{font-size:0.74rem;color:var(–text-light);font-style:italic;margin-bottom:10px;}
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:12px;border-top:1px solid var(–border);}
.card-price{font-family:var(–font-mono);color:var(–forest);font-weight:500;font-size:1rem;}
.card-price del{font-size:0.76rem;color:var(–text-light);margin-left:5px;}

/* 加入購物車按鈕 */
.btn-cart{padding:8px 16px;background:var(–forest);color:var(–cream);border-radius:var(–radius-full);font-size:0.78rem;transition:all var(–transition);display:flex;align-items:center;gap:5px;}
.btn-cart:hover{background:var(–deep-forest);transform:scale(1.04);}
.btn-cart:disabled{background:var(–text-muted);cursor:not-allowed;transform:none;}
.btn-cart.added{background:var(–moss);pointer-events:none;}

.badge{position:absolute;top:12px;left:12px;padding:4px 10px;border-radius:var(–radius-full);font-size:0.68rem;color:#fff;z-index:2;font-family:var(–font-mono);}
.badge–hot{background:var(–terracotta);}
.badge–sale{background:var(–blush);}
.badge–out{background:#aaa;}

/* ── CART DRAWER ── */
.cart-overlay{position:fixed;inset:0;background:rgba(37,50,40,0.4);z-index:200;opacity:0;pointer-events:none;transition:opacity var(–transition);backdrop-filter:blur(2px);}
.cart-overlay.open{opacity:1;pointer-events:all;}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:min(400px,95vw);background:var(–white);z-index:201;transform:translateX(100%);transition:transform .35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;box-shadow:var(–shadow-lg);}
.cart-drawer.open{transform:translateX(0);}
.cart-hd{display:flex;align-items:center;justify-content:space-between;padding:22px;border-bottom:1px solid var(–border);}
.cart-hd h2{font-family:var(–font-serif);font-size:1.05rem;font-weight:500;color:var(–deep-forest);}
.cart-close-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(–text-muted);transition:all var(–transition);cursor:pointer;}
.cart-close-btn:hover{background:var(–sand);color:var(–forest);}
.cart-bd{flex:1;overflow-y:auto;padding:20px;}
.cart-empty-msg{text-align:center;padding:60px 0;color:var(–text-light);font-size:0.9rem;}
.cart-empty-msg p{margin-top:10px;}

/* Cart Item */
.cart-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(–border);}
.cart-item:last-child{border-bottom:none;}
.ci-thumb{width:60px;height:60px;border-radius:var(–radius-md);background:var(–sand-light);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;overflow:hidden;}
.ci-thumb img{width:100%;height:100%;object-fit:cover;}
.ci-info{flex:1;}
.ci-name{font-size:0.86rem;font-weight:500;color:var(–deep-forest);margin-bottom:3px;}
.ci-size{font-size:0.7rem;color:var(–text-light);font-family:var(–font-mono);margin-bottom:8px;}
.ci-ctrl{display:flex;align-items:center;gap:8px;}
.qty-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:var(–text-muted);cursor:pointer;transition:all var(–transition);}
.qty-btn:hover{border-color:var(–moss);color:var(–forest);}
.qty-val{font-family:var(–font-mono);font-size:0.82rem;min-width:18px;text-align:center;}
.ci-price{font-family:var(–font-mono);font-size:0.86rem;color:var(–forest);align-self:flex-start;white-space:nowrap;}

/* Cart Footer */
.cart-ft{padding:20px;border-top:1px solid var(–border);background:var(–sand-light);}
.cart-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:0.88rem;color:var(–text-muted);}
.cart-row span:last-child{font-family:var(–font-mono);}
.cart-total-row{display:flex;justify-content:space-between;margin-bottom:18px;font-weight:500;font-size:1rem;color:var(–deep-forest);padding-top:12px;border-top:1px solid var(–border);}
.cart-total-row span:last-child{font-family:var(–font-mono);color:var(–forest);}
.btn-checkout{width:100%;padding:14px;background:var(–forest);color:var(–cream);border-radius:var(–radius-full);font-size:0.9rem;font-family:var(–font-serif);letter-spacing:0.05em;transition:all var(–transition);border:none;cursor:pointer;}
.btn-checkout:hover{background:var(–deep-forest);}
.btn-checkout:disabled{background:var(–text-muted);cursor:not-allowed;}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:28px;right:28px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{padding:11px 18px;background:var(–deep-forest);color:var(–cream);border-radius:var(–radius-md);font-size:0.8rem;box-shadow:var(–shadow-md);animation:toastIn .3s ease;display:flex;align-items:center;gap:7px;}
@keyframes toastIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.toast.out{animation:toastOut .3s ease forwards;}
@keyframes toastOut{to{opacity:0;transform:translateX(18px)}}

/* ── RWD ── */
@media(max-width:768px){
.shop-layout{grid-template-columns:1fr;padding-top:88px;}
.sidebar{display:none;}
}
@media(max-width:480px){
.container{padding:0 16px;}
}
</style>

</head>
<body>

<!-- NAV -->

<nav class="nav" id="nav">
  <div class="container nav__inner">
    <a href="index.html" class="nav__logo">陽光花園 jackpipi</a>
    <div class="nav__links">
      <a href="product.html" class="nav__link active">所有植物</a>
      <a href="tools.html" class="nav__link">介質與工具</a>
      <a href="pet.html" class="nav__link">照護助手</a>
      <a href="about.html" class="nav__link">品牌故事</a>
      <!-- ✅ 購物車按鈕（含角標） -->
      <button class="nav__cart-btn" id="open-cart">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        購物車
        <span class="cart-count" id="cart-count">0</span>
      </button>
    </div>
  </div>
</nav>

<!-- SHOP LAYOUT -->

<div class="container shop-layout">

  <!-- SIDEBAR -->

  <aside class="sidebar">
    <div style="margin-bottom:32px;">
      <p class="sidebar-title">植物分類</p>
      <button class="filter-btn active" data-cat="">全部選品</button>
      <button class="filter-btn" data-cat="beginner">🌱 新手入門</button>
      <button class="filter-btn" data-cat="collector">🪴 資深玩家</button>
      <button class="filter-btn" data-cat="media-tools">🪣 介質與工具</button>
    </div>
    <!-- 寵物友善篩選 -->
    <div>
      <p class="sidebar-title">篩選條件</p>
      <label style="display:flex;align-items:center;gap:8px;font-size:0.86rem;color:var(--text-muted);cursor:pointer;padding:8px 0;">
        <input type="checkbox" id="pet-filter" style="accent-color:var(--moss);width:15px;height:15px;"/>
        🐾 寵物友善
      </label>
    </div>
  </aside>

  <!-- MAIN -->

  <main>
    <div class="product-toolbar">
      <span class="product-count" id="product-count">連線中...</span>
    </div>
    <div id="product-grid">
      <div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text-muted);">
        <div style="font-size:2rem;margin-bottom:12px;">🌿</div>
        植物室同步中...
      </div>
    </div>
  </main>
</div>

<!-- ── CART DRAWER ── -->

<div class="cart-overlay" id="cart-overlay"></div>
<aside class="cart-drawer" id="cart-drawer">
  <div class="cart-hd">
    <h2>購物車</h2>
    <button class="cart-close-btn" id="close-cart" aria-label="關閉購物車">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="cart-bd" id="cart-body"></div>
  <div class="cart-ft">
    <div class="cart-row"><span>商品小計</span><span id="cart-sub">NT$ 0</span></div>
    <div class="cart-row" style="font-size:0.76rem;color:var(--text-light);"><span>運費結帳時計算</span><span>—</span></div>
    <div class="cart-total-row"><span>預估合計</span><span id="cart-total">NT$ 0</span></div>
    <button class="btn-checkout" id="btn-checkout" onclick="location.href='checkout.html'">前往結帳 →</button>
  </div>
</aside>

<!-- TOAST -->

<div class="toast-wrap" id="toast-wrap"></div>

<!-- ── SCRIPT ── -->

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, where }
                           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyC103Q-v31-z7nHnnM8KpIZbrrzjrGgGJ4",
  authDomain:        "fir-config-f2e57.firebaseapp.com",
  projectId:         "fir-config-f2e57",
  storageBucket:     "fir-config-f2e57.firebasestorage.app",
  messagingSenderId: "860181486529",
  appId:             "1:860181486529:web:6f7053a9141694afc66d40"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── 狀態 ──
let dbProducts    = [];
let currentCat    = '';
let petOnly       = false;

// ── 購物車工具函式 ──
function getCart()          { return JSON.parse(localStorage.getItem('jk_cart') || '[]'); }
function saveCart(c)        { localStorage.setItem('jk_cart', JSON.stringify(c)); }
function cartTotal(c)       { return c.reduce((s, i) => s + i.price * i.qty, 0); }
function cartCount(c)       { return c.reduce((s, i) => s + i.qty, 0); }

/** 加入購物車主邏輯 */
function addToCart(product) {
  const cart = getCart();
  const existing = cart.find(x => x.id === product.id);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({
      id:    product.id,
      name:  product.name,
      price: product.price,
      size:  product.size || '—',
      emoji: product.emoji || '🌿',
      imageUrl: product.imageUrl || '',
      qty:   1
    });
  }
  saveCart(cart);
  updateCartCount();
  showToast(`✦ ${product.name} 已加入購物車`);
}

/** 更新 Nav 角標 */
function updateCartCount() {
  const n   = cartCount(getCart());
  const el  = document.getElementById('cart-count');
  el.textContent    = n;
  el.style.display  = n > 0 ? 'flex' : 'none';
}

/** 渲染 Drawer 內容 */
function renderCartDrawer() {
  const cart    = getCart();
  const bodyEl  = document.getElementById('cart-body');
  const subEl   = document.getElementById('cart-sub');
  const totEl   = document.getElementById('cart-total');
  const checkEl = document.getElementById('btn-checkout');

  const total = cartTotal(cart);
  subEl.textContent  = `NT$ ${total.toLocaleString()}`;
  totEl.textContent  = `NT$ ${total.toLocaleString()}`;
  checkEl.disabled   = cart.length === 0;

  if (!cart.length) {
    bodyEl.innerHTML = `
      <div class="cart-empty-msg">
        <div style="font-size:2.4rem">🛒</div>
        <p>購物車是空的</p>
        <p style="font-size:0.78rem;margin-top:6px;color:var(--text-light)">快去選幾株植物回家吧！</p>
      </div>`;
    return;
  }

  bodyEl.innerHTML = cart.map(item => {
    const thumb = item.imageUrl
      ? `<img src="${item.imageUrl}" alt="${item.name}">`
      : item.emoji;
    return `
      <div class="cart-item">
        <div class="ci-thumb">${thumb}</div>
        <div class="ci-info">
          <p class="ci-name">${item.name}</p>
          <p class="ci-size">${item.size}</p>
          <div class="ci-ctrl">
            <button class="qty-btn" data-action="dec" data-id="${item.id}">−</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" data-action="inc" data-id="${item.id}">+</button>
          </div>
        </div>
        <p class="ci-price">NT$ ${(item.price * item.qty).toLocaleString()}</p>
      </div>`;
  }).join('');
}

/** 購物車 Drawer 數量操作 */
document.getElementById('cart-body').addEventListener('click', e => {
  const btn = e.target.closest('.qty-btn');
  if (!btn) return;
  const cart = getCart();
  const item = cart.find(x => x.id === btn.dataset.id);
  if (!item) return;
  if (btn.dataset.action === 'inc') {
    item.qty++;
  } else {
    item.qty--;
    if (item.qty <= 0) cart.splice(cart.indexOf(item), 1);
  }
  saveCart(cart);
  updateCartCount();
  renderCartDrawer();
});

// ── Toast ──
function showToast(msg) {
  const wrap = document.getElementById('toast-wrap');
  const t    = document.createElement('div');
  t.className   = 'toast';
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => {
    t.classList.add('out');
    t.addEventListener('animationend', () => t.remove(), { once: true });
  }, 2200);
}

// ── Firebase: 監聽商品 ──
function initProducts() {
  const q = query(collection(db, 'products'), where('active', '==', true));
  onSnapshot(q, snapshot => {
    dbProducts = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderProducts();
  }, err => {
    document.getElementById('product-grid').innerHTML =
      `<div style="grid-column:1/-1;text-align:center;padding:40px;color:red;">讀取失敗：${err.message}</div>`;
  });
}

// ── 渲染商品卡片 ──
function renderProducts() {
  const grid     = document.getElementById('product-grid');
  const countEl  = document.getElementById('product-count');

  let list = dbProducts;
  if (currentCat) list = list.filter(p => p.category === currentCat);
  if (petOnly)    list = list.filter(p => p.petSafe);

  countEl.textContent = `顯示 ${list.length} 件選品`;

  if (!list.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text-muted);">
      目前沒有符合條件的植物 🌵
    </div>`;
    return;
  }

  const catLabel = { beginner: '🌱 新手入門', collector: '🪴 資深玩家', 'media-tools': '🪣 介質工具' };

  grid.innerHTML = list.map(p => {
    const isOut  = p.stock <= 0;
    const isSale = p.originalPrice > p.price;
    const media  = p.imageUrl
      ? `<img src="${p.imageUrl}" alt="${p.name}">`
      : `<span class="card-emoji">${p.emoji || '🌿'}</span>`;

    let badge = '';
    if (isOut)       badge = `<span class="badge badge--out">補貨中</span>`;
    else if (p.featured) badge = `<span class="badge badge--hot">熱銷</span>`;
    else if (isSale) badge = `<span class="badge badge--sale">特價</span>`;

    const priceHtml = isSale
      ? `NT$ ${p.price}<del>NT$ ${p.originalPrice}</del>`
      : `NT$ ${p.price}`;

    return `
      <article class="product-card" style="${isOut ? 'opacity:0.65;filter:grayscale(0.4);' : ''}">
        <div class="card-img">
          ${badge}
          ${media}
        </div>
        <div class="card-body">
          <p class="card-cat">${catLabel[p.category] || p.category}</p>
          <h3 class="card-name">${p.name}</h3>
          ${p.species ? `<p class="card-species">${p.species}</p>` : ''}
          <div class="card-footer">
            <p class="card-price">${priceHtml}</p>
            <!-- ✅ 真正有效的加入購物車按鈕 -->
            <button
              class="btn-cart add-to-cart-btn"
              data-id="${p.id}"
              ${isOut ? 'disabled' : ''}>
              ${isOut ? '補貨中' : '＋ 加入'}
            </button>
          </div>
        </div>
      </article>`;
  }).join('');
}

// ── 事件綁定 ──

// 加入購物車（事件代理）
document.getElementById('product-grid').addEventListener('click', e => {
  const btn = e.target.closest('.add-to-cart-btn');
  if (!btn || btn.disabled) return;
  const product = dbProducts.find(x => x.id === btn.dataset.id);
  if (!product) return;

  addToCart(product);

  // 按鈕反饋動畫
  btn.textContent = '✓ 已加入';
  btn.classList.add('added');
  setTimeout(() => {
    btn.textContent = '＋ 加入';
    btn.classList.remove('added');
  }, 1800);
});

// 篩選分類
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentCat = e.target.dataset.cat;
    renderProducts();
  });
});

// 寵物友善篩選
document.getElementById('pet-filter').addEventListener('change', e => {
  petOnly = e.target.checked;
  renderProducts();
});

// 開啟 / 關閉 Drawer
function openCart() {
  renderCartDrawer();
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('open-cart').addEventListener('click', openCart);
document.getElementById('close-cart').addEventListener('click', closeCart);
document.getElementById('cart-overlay').addEventListener('click', closeCart);

// ESC 關閉
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCart(); });

// Nav scroll 效果
window.addEventListener('scroll', () => {
  const nav = document.getElementById('nav');
  nav.style.boxShadow = window.scrollY > 40 ? '0 4px 20px rgba(0,0,0,0.06)' : 'none';
});

// ── 初始化 ──
updateCartCount();
initProducts();
</script>

</body>
</html>
