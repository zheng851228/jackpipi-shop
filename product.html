<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>所有植物 — 陽光花園 jackpipi</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
/* ── 核心樣式 ── */
:root {
  --sage:#A8B5A2; --moss:#6B7C5C; --forest:#3D5040; --deep-forest:#253228;
  --sand:#E8DDD0; --sand-light:#F5F0EA; --cream:#FAF7F2; --bg:#F5F2EE;
  --white:#FFFFFF; --text:#2E2E2E; --text-muted:#7A7A7A; --terracotta:#B5704F;
  --border:rgba(107,124,92,0.15); --font-serif:'Noto Serif TC',serif; --font-mono:'DM Mono',monospace;
}
body { font-family:var(--font-serif); background:var(--bg); color:var(--text); margin:0; padding:0; }
a { text-decoration:none; color:inherit; }
button { cursor:pointer; font-family:inherit; border:none; background:none; }
.container { max-width:1200px; margin:0 auto; padding:0 24px; }

/* ── 導覽列與排版 ── */
.nav { position:fixed; top:0; width:100%; height:72px; background:rgba(245,242,238,0.9); border-bottom:1px solid var(--border); display:flex; align-items:center; z-index:100; }
.nav__inner { display:flex; justify-content:space-between; width:100%; align-items:center; }
.shop-layout { display:grid; grid-template-columns:240px 1fr; gap:48px; padding:120px 0 100px; align-items:start; }

/* ── 側邊欄 ── */
.sidebar-title { font-family:var(--font-mono); font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; margin-bottom:14px; border-bottom:1px solid var(--border); padding-bottom:8px; }
.filter-btn { display:block; width:100%; text-align:left; padding:8px 12px; margin-bottom:4px; border-radius:8px; font-size:0.86rem; color:var(--text-muted); transition:0.3s; }
.filter-btn:hover, .filter-btn.active { background:var(--forest); color:var(--cream); }

/* ── 產品網格與卡片 ── */
.product-toolbar { display:flex; justify-content:space-between; margin-bottom:24px; }
#product-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:24px; }
.product-card { background:var(--white); border-radius:16px; overflow:hidden; border:1px solid var(--border); display:flex; flex-direction:column; transition:0.3s; position:relative; }
.product-card:hover { transform:translateY(-5px); box-shadow:0 12px 24px rgba(61,80,64,0.1); }
.card-img { aspect-ratio:1/1; background:var(--sand-light); display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
.card-img img { width:100%; height:100%; object-fit:cover; }
.card-body { padding:18px; display:flex; flex-direction:column; flex:1; }
.card-cat { font-size:0.7rem; color:var(--moss); font-family:var(--font-mono); margin-bottom:4px; }
.card-name { font-size:1.1rem; font-weight:700; color:var(--deep-forest); margin-bottom:8px; }
.card-price { font-family:var(--font-mono); color:var(--forest); font-weight:500; margin-top:auto; }
.btn-cart { padding:8px 16px; background:var(--forest); color:var(--cream); border-radius:99px; font-size:0.8rem; transition:0.3s; }
.btn-cart:hover { background:var(--deep-forest); }
.btn-cart:disabled { background:#ccc; cursor:not-allowed; }
.badge { position:absolute; top:12px; left:12px; padding:4px 10px; border-radius:99px; font-size:0.7rem; color:#fff; z-index:2; }

@media(max-width:768px){ .shop-layout { grid-template-columns:1fr; } .sidebar { display:none; } }
</style>
</head>
<body>

<nav class="nav">
  <div class="container nav__inner">
    <a href="index.html" style="font-weight:700; color:var(--forest);">陽光花園 jackpipi</a>
    <div style="display:flex; gap:20px; font-size:0.88rem; color:var(--text-muted);">
      <a href="product.html" style="color:var(--forest);">所有植物</a>
      <a href="pet.html">照護助手</a>
    </div>
  </div>
</nav>

<div class="container shop-layout">
  
  <aside class="sidebar">
    <div style="margin-bottom:30px;">
      <p class="sidebar-title">植物分類</p>
      <button class="filter-btn active" data-cat="">全部選品</button>
      <button class="filter-btn" data-cat="beginner">🌱 新手入門</button>
      <button class="filter-btn" data-cat="collector">🪴 資深玩家</button>
      <button class="filter-btn" data-cat="media-tools">🪣 介質與工具</button>
    </div>
  </aside>

  <main>
    <div class="product-toolbar">
      <span id="product-count" style="font-size:0.88rem; color:var(--text-muted);">載入中...</span>
    </div>
    
    <div id="product-grid">
      <div style="text-align:center; padding:40px; color:var(--text-muted);">連線至植物室中...🌿</div>
    </div>
  </main>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC103Q-v31-z7nHnnM8KpIZbrrzjrGgGJ4",
  authDomain: "fir-config-f2e57.firebaseapp.com",
  projectId: "fir-config-f2e57",
  storageBucket: "fir-config-f2e57.firebasestorage.app",
  messagingSenderId: "860181486529",
  appId: "1:860181486529:web:6f7053a9141694afc66d40"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let dbProducts = [];
let currentCategory = '';

// 1. 啟動資料庫監聽
function initApp() {
  const grid = document.getElementById('product-grid');
  
  // 測試紀錄：可以在瀏覽器 F12 的 Console 看到這行
  console.log("🚀 開始連線至 Firebase...");

  const q = query(collection(db, "products"), where("active", "==", true));
  
  onSnapshot(q, (snapshot) => {
    dbProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    console.log("✅ 成功抓取資料數量：", dbProducts.length);
    renderProducts();
  }, (error) => {
    console.error("❌ Firebase 讀取錯誤：", error);
    grid.innerHTML = `<div style="text-align:center; padding:40px; color:red;">讀取失敗：${error.message}</div>`;
  });
}

// 2. 渲染畫面
function renderProducts() {
  const grid = document.getElementById('product-grid');
  const countEl = document.getElementById('product-count');
  
  let list = dbProducts;
  if (currentCategory) {
    list = list.filter(p => p.category === currentCategory);
  }

  countEl.textContent = `顯示 ${list.length} 件商品`;

  if (list.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:60px; color:#888;">目前沒有符合條件的植物。請確認後台是否有勾選「立即上架」。</div>';
    return;
  }

  grid.innerHTML = list.map(p => {
    const isOut = p.stock <= 0;
    const isSale = p.originalPrice > p.price;
    
    // 圖片或 Emoji 處理
    const media = p.imageUrl 
      ? `<img src="${p.imageUrl}" alt="${p.name}">`
      : `<div style="font-size:4rem;">${p.emoji || '🌿'}</div>`;

    // 標籤處理
    let badgeHtml = '';
    if (isOut) badgeHtml = `<span class="badge" style="background:#888">已售罄</span>`;
    else if (p.featured) badgeHtml = `<span class="badge" style="background:var(--terracotta)">熱銷</span>`;
    else if (isSale) badgeHtml = `<span class="badge" style="background:var(--blush)">特價</span>`;

    return `
      <article class="product-card" style="${isOut ? 'opacity:0.6; filter:grayscale(0.5);' : ''}">
        <div class="card-img">
          ${badgeHtml}
          ${media}
        </div>
        <div class="card-body">
          <p class="card-cat">${p.category === 'beginner' ? '🌱 新手入門' : p.category === 'collector' ? '🪴 資深玩家' : '🪣 介質與工具'}</p>
          <h3 class="card-name">${p.name}</h3>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:auto;">
            <p class="card-price">NT$ ${p.price || 0}</p>
            <button class="btn-cart add-to-cart-btn" data-id="${p.id}" ${isOut ? 'disabled' : ''}>
              ${isOut ? '補貨中' : '加入購物車'}
            </button>
          </div>
        </div>
      </article>
    `;
  }).join('');
}

// 3. 綁定篩選按鈕事件 (安全的寫法)
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    currentCategory = e.target.dataset.cat;
    renderProducts();
  });
});

// 4. 綁定加入購物車事件 (事件代理寫法，解決 onclick 找不到函數的問題)
document.getElementById('product-grid').addEventListener('click', (e) => {
  const btn = e.target.closest('.add-to-cart-btn');
  if (!btn) return;
  
  const id = btn.dataset.id;
  const p = dbProducts.find(x => x.id === id);
  if (p) {
    alert(`✦ 已將 ${p.name} 加入購物車！`);
    // 這裡可以接續您原本寫入 localStorage 的購物車邏輯
  }
});

// 啟動系統
initApp();
</script>

</body>
</html>
